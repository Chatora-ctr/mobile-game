<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Card Craft</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
* { box-sizing:border-box; margin:0; padding:0;
    font-family:'Hiragino Maru Gothic ProN','Hiragino Maru Gothic Pro','BIZ UDPGothic','Nunito',sans-serif; }
body { overflow:hidden; background:#b8e0b2; touch-action:none; }
canvas { display:block; }

#ui {
  position:fixed; top:0; left:0; width:100%; height:52px;
  background:linear-gradient(180deg,#1a1a2e,#16213e);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 10px; z-index:10;
  border-bottom:2px solid #e8b84b;
  box-shadow:0 2px 8px rgba(0,0,0,.5); gap:6px;
}
.ui-zone {
  display:flex; align-items:center; justify-content:center; gap:4px;
  font-size:11px; border-radius:6px; padding:4px 8px; height:36px;
  transition:background .2s,border-color .2s; flex-shrink:0; white-space:nowrap;
}
#trashZone {
  color:#ccc; background:rgba(255,255,255,.07);
  border:1px dashed rgba(255,255,255,.3); min-width:60px;
}
#trashZone.active { background:rgba(255,80,80,.3); border-color:#ff5050; color:#ff9090; }

.ui-zone, #packOverlay h2, #packOverlay button,
#mealOverlay h2, #mealInfo, #mealConfirmBtn,
#gameoverOverlay h1, #gameoverOverlay p, #restartBtn,
#initPackCard, #dayLabel, #toast,
#battleOverlay h2, #battleLog, .battle-card {
  font-family:'Hiragino Maru Gothic ProN','Hiragino Maru Gothic Pro','BIZ UDPGothic','Nunito',sans-serif;
}
#packShopsRow { display:flex; gap:5px; flex:1; justify-content:center; }
.pack-shop-zone {
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:1px; font-size:10px; border-radius:6px;
  padding:2px 7px; height:36px; white-space:nowrap; line-height:1.3;
}
.pack-shop-zone .ps-name { font-weight:bold; font-size:11px; font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Nunito',sans-serif; }
.pack-shop-zone .ps-cost { font-size:9px; opacity:.8; }
.pack-shop-zone .ps-num  { font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Nunito',sans-serif; }
.emoji { font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif; }
#packShopA { color:#e8d080; background:rgba(232,184,75,.1); border:1px dashed rgba(232,184,75,.5); }
#packShopA.active { background:rgba(232,184,75,.35); border-color:#e8b84b; }
#packShopB { color:#a0d0ff; background:rgba(80,160,255,.1); border:1px dashed rgba(80,160,255,.4); }
#packShopB.active { background:rgba(80,160,255,.3); border-color:#60b0ff; }
/* 解放パック（章クリア後） */
.pack-shop-zone.locked {
  opacity:.35; pointer-events:none; filter:grayscale(1);
}
.pack-shop-zone.unlocked-new {
  animation:pack-unlock .6s ease;
}
@keyframes pack-unlock {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.18); }
  100% { transform:scale(1); }
}

/* 日数バー */
#dayBarWrap {
  position:fixed; top:52px; left:0; width:100%; height:8px;
  background:rgba(0,0,0,.25); z-index:9;
}
#dayBar { height:100%; width:0%; background:linear-gradient(90deg,#f0c040,#f08020); }
#dayLabel {
  position:fixed; top:53px; left:50%; transform:translateX(-50%);
  font-size:10px; color:#ffe; text-shadow:0 1px 3px #000;
  pointer-events:none; z-index:9; white-space:nowrap; line-height:1; padding-top:1px;
}

/* 初期パック */
#initPackCard {
  position:fixed; bottom:80px; right:16px;
  width:86px; height:108px;
  background:linear-gradient(135deg,#2a2a4a,#1a1a3a);
  border:2px solid #e8b84b; border-radius:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#e8b84b; font-size:11px; font-weight:bold;
  cursor:pointer; z-index:20; box-shadow:0 4px 12px rgba(0,0,0,.5);
  gap:5px; user-select:none;
}
#initPackCard .pi { font-size:30px; }
#initPackCard sub { font-size:9px; color:#aaa; font-weight:normal; }
#initPackCard:active { transform:scale(.95); }

/* パック開封 */
#packOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); z-index:100;
  flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#packOverlay.show { display:flex; }
#packOverlay h2 { color:#e8b84b; font-size:20px; letter-spacing:2px; }
#packCards { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.pack-card-preview {
  width:80px; height:100px; border-radius:8px; overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
  opacity:0; transform:scale(.6); transition:opacity .25s,transform .25s;
}
.pack-card-preview.pop { opacity:1; transform:scale(1); }
.pch { height:24px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; }
.pcb { flex:1; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; padding:4px; }
#packCloseBtn {
  padding:10px 32px; font-size:15px;
  background:linear-gradient(135deg,#e8b84b,#c49a2a);
  color:#1a1a1a; border:none; border-radius:8px; font-weight:bold; cursor:pointer;
}

/* 食事ターン */
#mealOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.8); z-index:200;
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#mealOverlay.show { display:flex; }
#mealOverlay h2 { color:#f0c040; font-size:20px; letter-spacing:1px; }
#mealInfo { color:#eee; font-size:13px; text-align:center; line-height:1.8; }
#mealFoodList {
  display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:90vw;
}
.meal-food-item {
  width:72px; height:90px; border-radius:7px; overflow:hidden;
  cursor:pointer; border:2px solid transparent;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  transition:border-color .15s,transform .15s; user-select:none;
}
.meal-food-item.selected { border-color:#f0c040; transform:scale(1.06); }
.meal-food-item .mfh { height:22px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:#fff; }
.meal-food-item .mfb { flex:1; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; padding:3px; text-align:center; color:#fff; }
#mealConfirmBtn {
  padding:10px 28px; font-size:15px;
  background:linear-gradient(135deg,#f0c040,#c09020);
  color:#1a1a1a; border:none; border-radius:8px; font-weight:bold; cursor:pointer;
}

/* ゲームオーバー */
#gameoverOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.88); z-index:300;
  flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#gameoverOverlay.show { display:flex; }
#gameoverOverlay h1 { color:#ff6060; font-size:32px; letter-spacing:3px; }
#gameoverOverlay p { color:#ccc; font-size:14px; text-align:center; }
#restartBtn {
  padding:12px 36px; font-size:16px;
  background:linear-gradient(135deg,#e8b84b,#c49a2a);
  color:#1a1a1a; border:none; border-radius:8px; font-weight:bold; cursor:pointer;
}



/* 戦闘オーバーレイ */
#battleOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.85); z-index:250;
  flex-direction:column; align-items:center; justify-content:center; gap:12px;
}
#battleOverlay.show { display:flex; }
#battleOverlay h2 { color:#ff8080; font-size:18px; letter-spacing:1px; }
#battleArena { display:flex; gap:30px; align-items:center; justify-content:center; }
.battle-card {
  width:90px; background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.2); border-radius:10px;
  padding:8px; text-align:center; color:#fff;
}
.battle-card .bc-name { font-size:12px; font-weight:bold; margin-bottom:4px; }
.battle-card .bc-hp   { font-size:11px; margin-bottom:4px; }
.bc-hpbar-wrap { height:8px; background:rgba(0,0,0,.4); border-radius:4px; overflow:hidden; margin-bottom:4px; }
.bc-hpbar { height:100%; background:#4caf50; border-radius:4px; transition:width .3s; }
.battle-card .bc-stats { font-size:10px; opacity:.7; }
#battleLog {
  width:280px; max-width:90vw; height:130px; overflow-y:auto;
  background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.1);
  border-radius:8px; padding:8px; font-size:11px; color:#ddd;
}
#battleLog p { margin:2px 0; }
#battleLog p.atk-human  { color:#80c8ff; }
#battleLog p.atk-mob    { color:#ff9090; }
#battleLog p.result-win  { color:#80ff80; font-weight:bold; }
#battleLog p.result-lose { color:#ff6060; font-weight:bold; }

/* 売却フェーズバナー */
#sellBanner {
  display:none; position:fixed; top:60px; left:0; width:100%; z-index:15;
  background:rgba(180,80,0,.92); color:#fff; padding:6px 14px;
  font-size:12px; font-weight:bold; text-align:center;
  border-bottom:2px solid #f0a040;
}
#sellBanner.show { display:block; }

/* 速度・一時停止ボタン */
#speedBtns {
  position:fixed; bottom:16px; left:16px;
  display:flex; gap:6px; z-index:20;
}
.speed-btn {
  width:40px; height:40px; border-radius:20px;
  background:rgba(20,20,40,.82); border:1px solid rgba(255,255,255,.3);
  color:#fff; font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  user-select:none;
}
.speed-btn.active { background:rgba(232,184,75,.6); border-color:#e8b84b; }

/* クエストパネル */
/* レシピパネル */
#recipeBtn {
  position:fixed; bottom:16px; right:72px;
  width:48px; height:48px; border-radius:24px;
  background:rgba(20,20,40,.88); border:2px solid #6a9aff;
  color:#6a9aff; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  z-index:20; user-select:none;
}
#recipePanel {
  display:none; position:fixed; right:0; top:60px;
  width:260px; max-width:90vw; height:calc(100vh - 60px);
  background:rgba(16,16,32,.95); border-left:2px solid #6a9aff;
  z-index:25; overflow-y:auto; padding:12px;
  flex-direction:column; gap:6px;
}
#recipePanel.show { display:flex; }
#recipePanel h3 { color:#6a9aff; font-size:14px; margin-bottom:6px; }
.recipe-item {
  padding:7px 8px; border-radius:6px;
  background:rgba(255,255,255,.05);
  font-size:11px; color:#ccc; line-height:1.5;
}
.recipe-item .ri-title { font-weight:bold; color:#aac4ff; margin-bottom:2px; }
.recipe-item .ri-arrow { color:#888; }

#questBtn {
  position:fixed; bottom:16px; right:16px;
  width:48px; height:48px; border-radius:24px;
  background:rgba(20,20,40,.88); border:2px solid #e8b84b;
  color:#e8b84b; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  z-index:20; user-select:none;
}
#questPanel {
  display:none; position:fixed; right:0; top:60px;
  width:260px; max-width:90vw; height:calc(100vh - 60px);
  background:rgba(16,16,32,.95); border-left:2px solid #e8b84b;
  z-index:25; overflow-y:auto; padding:12px;
  flex-direction:column; gap:6px;
}
#questPanel.show { display:flex; }
#questPanel h3 { color:#e8b84b; font-size:14px; margin-bottom:6px; }
.quest-item {
  display:flex; align-items:flex-start; gap:8px;
  padding:7px 8px; border-radius:6px;
  background:rgba(255,255,255,.05);
  font-size:11px; color:#ccc; line-height:1.4;
}
.quest-item.done { color:#888; }
.quest-item.done .q-check { color:#4caf50; }
.quest-check { width:16px; flex-shrink:0; font-size:13px; }

#toast {
  position:fixed; top:68px; left:50%; transform:translateX(-50%);
  background:rgba(20,20,40,.9); color:#fff; font-size:12px;
  padding:6px 16px; border-radius:16px; border:1px solid rgba(255,255,255,.15);
  pointer-events:none; z-index:50; opacity:0; transition:opacity .25s; white-space:nowrap;
}
#toast.show { opacity:1; }
</style>
</head>
<body>

<div id="ui">
  <div class="ui-zone" id="trashZone">売却</div>
  <div id="packShopsRow">
    <div class="pack-shop-zone" id="packShopA">
      <span class="ps-name">冒険パック</span><span class="ps-cost"><span class="emoji">💎</span><span class="ps-num">×3</span></span>
    </div>
    <div class="pack-shop-zone" id="packShopB">
      <span class="ps-name" id="packShopB-name">農業パック</span><span class="ps-cost" id="packShopB-cost"><span class="emoji">💎</span><span class="ps-num">×4</span></span>
    </div>
  </div>
  <div id="cardCount" style="color:#ccc;font-size:11px;white-space:nowrap;flex-shrink:0;">0/20</div>
</div>

<div id="dayBarWrap"><div id="dayBar"></div></div>
<div id="dayLabel">0日目</div>

<canvas id="game"></canvas>

<div id="initPackCard">
  <div class="pi">📦</div><div>冒険の始まり</div><sub>タップで開封</sub>
</div>

<div id="packOverlay">
  <h2>パック開封！</h2>
  <div id="packCards"></div>
  <button id="packCloseBtn">盤面に追加</button>
</div>

<div id="mealOverlay">
  <h2>🍽 食事の時間</h2>
  <div id="mealInfo"></div>
  <div id="mealFoodList"></div>
  <button id="mealConfirmBtn">確定</button>
</div>

<div id="battleOverlay">
  <h2>⚔ 戦闘！</h2>
  <div id="battleArena">
    <div class="battle-card">
      <div class="bc-name" id="bc-human-name">村人</div>
      <div class="bc-hp"   id="bc-human-hp">HP 10/10</div>
      <div class="bc-hpbar-wrap"><div class="bc-hpbar" id="bc-human-bar" style="width:100%"></div></div>
      <div class="bc-stats" id="bc-human-stats">攻3 防1</div>
    </div>
    <div style="color:#ff8080;font-size:22px;">VS</div>
    <div class="battle-card">
      <div class="bc-name" id="bc-mob-name">敵</div>
      <div class="bc-hp"   id="bc-mob-hp">HP 4/4</div>
      <div class="bc-hpbar-wrap"><div class="bc-hpbar" id="bc-mob-bar" style="width:100%"></div></div>
      <div class="bc-stats" id="bc-mob-stats">攻2 防0</div>
    </div>
  </div>
  <div id="battleLog"></div>
</div>

<div id="sellBanner">
  📦 カード超過！ <span id="sellBannerText"></span>　UIバーに売却してください
</div>

<div id="speedBtns">
  <div class="speed-btn" id="btnPause" title="一時停止">⏸</div>
  <div class="speed-btn active" id="btn1x" title="1倍速">×1</div>
  <div class="speed-btn" id="btn3x" title="3倍速">×3</div>
</div>

<div id="recipeBtn" title="入手済みレシピ">📖</div>
<div id="recipePanel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
    <h3 style="color:#6a9aff;font-size:14px;">📖 入手済みレシピ</h3>
    <button id="recipeCloseBtn" style="background:none;border:none;color:#aaa;font-size:18px;cursor:pointer;line-height:1;">×</button>
  </div>
  <div id="recipeList"></div>
</div>

<div id="questBtn" title="クエスト">📋</div>
<div id="questPanel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
    <h3 style="color:#e8b84b;font-size:14px;">📋 クエスト</h3>
    <button id="questCloseBtn" style="background:none;border:none;color:#aaa;font-size:18px;cursor:pointer;line-height:1;">×</button>
  </div>
  <div id="questList"></div>
</div>

<div id="gameoverOverlay">
  <h1>GAME OVER</h1>
  <p id="gameoverMsg"></p>
  <button id="restartBtn">もう一度</button>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════
// 定数
// ════════════════════════════════════════════════
const canvas = document.getElementById("game");
const ctx    = canvas.getContext("2d");
const UI_H   = 60;   // UIバー52px + 日数バー8px
const CW=80, CH=100;
const WORLD_W=2400, WORLD_H=2400;
const DAY_MS = 2 * 60 * 1000;

function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize();

// ── 属性スタイル ──────────────────────────────
const ATTR_STYLE = {
  human:    { hd:"#4a6a9a", bg:"#7aaad0", label:"人間",   light:false },
  resource: { hd:"#3a6a3a", bg:"#6aaa6a", label:"資源",   light:false },
  material: { hd:"#7a5020", bg:"#b88050", label:"素材",   light:false },
  building: { hd:"#6a5030", bg:"#a08060", label:"施設",   light:false },
  currency: { hd:"#2a6050", bg:"#4a9880", label:"通貨",   light:true  },
  tool:     { hd:"#5a3070", bg:"#9060a8", label:"道具",   light:true  },
  food:     { hd:"#a06000", bg:"#e09030", label:"食べ物", light:false },  // 茶〜橙：敵の赤と区別
  hostile:  { hd:"#7a1020", bg:"#c02840", label:"敵",     light:true  },  // より鮮やかな赤紫
  friendly: { hd:"#1a6070", bg:"#3aaabb", label:"友好",   light:false },  // 青緑：資源の緑と区別
  recipe:   { hd:"#3a3a6a", bg:"#6a6aaa", label:"レシピ", light:true  },
};
function attrSt(attr){ return ATTR_STYLE[attr]||{hd:"#888",bg:"#bbb",label:attr,light:false}; }

// ── カード定義 ────────────────────────────────
const DEFS = {
  human:      { label:"村人",       attr:"human",    sell:null, maxUses:null, maxHp:10, atk:3, def:1 },
  baby:       { label:"赤ちゃん",   attr:"human",    sell:null, maxUses:null, maxHp:5,  atk:1, def:0 },
  tree:       { label:"木",         attr:"resource", sell:1,    maxUses:2    },
  rock:       { label:"岩",         attr:"resource", sell:1,    maxUses:2    },
  apple_tree: { label:"リンゴの木", attr:"resource", sell:1,    maxUses:3    },
  wood:       { label:"木材",       attr:"material", sell:1,    maxUses:null },
  stick:      { label:"木の棒",     attr:"material", sell:2,    maxUses:null },
  dirt:       { label:"土",         attr:"material", sell:0,    maxUses:null },
  soil:       { label:"耕地",       attr:"building", sell:1,    maxUses:null },
  farm:       { label:"農場",       attr:"building", sell:3,    maxUses:null },
  bonfire:    { label:"焚き火",     attr:"building", sell:2,    maxUses:null },
  stone:      { label:"石材",       attr:"material", sell:1,    maxUses:null },
  flint:      { label:"火打石",     attr:"material", sell:2,    maxUses:null },
  seed:       { label:"種",         attr:"material", sell:1,    maxUses:null },
  flour:      { label:"小麦",       attr:"material", sell:1,    maxUses:null },
  house:      { label:"家",         attr:"building", sell:4,    maxUses:null },
  hoe:        { label:"くわ",       attr:"tool",     sell:2,    maxUses:3    },
  emerald:    { label:"エメラルド", attr:"currency", sell:null, maxUses:null },
  apple:      { label:"リンゴ",     attr:"food",     sell:1,    maxUses:null, satiety:1 },
  carrot:     { label:"ニンジン",   attr:"food",     sell:1,    maxUses:null, satiety:1 },
  raw_meat:   { label:"生肉",       attr:"food",     sell:3,    maxUses:null, satiety:0 },
  grilled_meat:{label:"焼いた肉",   attr:"food",     sell:3,    maxUses:null, satiety:3 },
  bread:      { label:"パン",       attr:"food",     sell:3,    maxUses:null, satiety:5 },
  rabbit:     { label:"ウサギ",     attr:"hostile",  sell:null, maxUses:null, maxHp:4, atk:2, def:0,
                drop:[{type:"raw_meat",w:85},{type:"carrot",w:15}] },
  tamed_rabbit:{ label:"うさぎ",    attr:"friendly", sell:2,    maxUses:null },
  warehouse:   { label:"倉庫",      attr:"building", sell:3,    maxUses:null, cardSlots:4 },
  recipe_card: { label:"レシピ",    attr:"recipe",   sell:1,    maxUses:null },
  bone:        { label:"骨",        attr:"material", sell:2,    maxUses:null },
  plantation:  { label:"植林場",    attr:"building", sell:4,    maxUses:null },
  quarry:      { label:"採石場",    attr:"building", sell:4,    maxUses:null },
};
function def(type){ return DEFS[type]||{label:type,attr:"material",sell:1,maxUses:null}; }

// ── レシピ ────────────────────────────────────

  { inputs:{human:1,tree:1},         variants:[{out:"wood", w:85},{out:"stick",w:10},{out:"apple",w:5}],time:10,  keepAttrs:["human"],             hasCard:false  },

// パックごとに排出するレシピカードを制御
// RECIPES配列のインデックスを指定。nullなら全hasCard:trueレシピが対象
const PACK_A_RECIPES = null; // 例: [0,1,2,5,7,9,10,13,15,16,17,18] で特定レシピのみ
const PACK_B_RECIPES = null; // 例: [10,11,12,13,14,15] で農業系のみ

// 現在のパックで排出可能なレシピかチェック
let _currentPackRecipeFilter = null; // drawPool呼び出し時にセット

function drawPool(pool, n, recipeFilter=null){
  let humanDrawnThisPack=false; // 同一パックで村人を複数排出しない
  return Array.from({length:n},()=>{
    const humanCount=cards.filter(c=>c.type==="human"||c.type==="baby").length;
    // 村人が2人以上いる、またはこのパックで既に村人を引いた場合は除外
    let filtered=(humanCount>=2||humanDrawnThisPack)
      ? pool.filter(p=>p.type!=="human")
      : pool;

    const hasUnownedRecipe=RECIPES.some((r,i)=>{
      if(!r.hasCard||ownedRecipes.has(i)) return false;
      if(recipeFilter===null) return true;
      return recipeFilter.includes(i);
    });
    if(hasUnownedRecipe&&!filtered.some(p=>p.type==="__recipe__")){
      filtered=[...filtered,{type:"__recipe__",w:10}];
    }
    const ftot=filtered.reduce((s,p)=>s+p.w,0);
    let r=Math.random()*ftot;
    let result=filtered[0].type;
    for(const p of filtered){r-=p.w;if(r<=0){result=p.type;break;}}
    if(result==="human") humanDrawnThisPack=true;
    return result;
  });
}

// レシピカード枠を解決（パックのrecipeFilterを考慮）
function resolveRecipeFromPool(recipeFilter=null){
  const available=RECIPES
    .map((r,i)=>({r,i}))
    .filter(({r,i})=>{
      if(!r.hasCard||ownedRecipes.has(i)) return false;
      if(recipeFilter===null) return true;
      return recipeFilter.includes(i);
    });
  if(available.length===0) return null;
  return available[Math.floor(Math.random()*available.length)].i;
}

function mkCard(type,x,y,extra={}){
  const d=def(type);
  const base={id:nextId++,type,x,y,w:CW,h:CH,stack:1,uses:0,maxUses:d.maxUses};
  if(d.maxHp!==undefined) base.hp=d.maxHp; // HP初期化
  return cards[cards.push({...base,...extra})-1];
}
function worldClamp(x,y){ return {x:Math.max(0,Math.min(WORLD_W-CW,x)), y:Math.max(0,Math.min(WORLD_H-CH,y))}; }

// ── カメラ変換 ──────────────────────────────
function s2w(sx,sy){ return {x:(sx-camX)/camScale, y:(sy-camY)/camScale}; }

// 初期カメラ：ワールド中央をスクリーン中央に合わせる
function initCamera(){
  const gameH = canvas.height - UI_H;
  camX = canvas.width/2  - INIT_WX * camScale;
  camY = gameH/2         - INIT_WY * camScale;
}
initCamera();
window.addEventListener("resize", ()=>{ resize(); initCamera(); });

// カメラをワールド境界内にクランプ
// ワールドの端がスクリーン外に出すぎないように制限する
function clampCam(){
  // ワールド左端 (x=0) がスクリーン右端より右に行かせない
  // ワールド右端 (x=WORLD_W) がスクリーン左端より左に行かせない
  const gameH = canvas.height - UI_H;
  const maxCamX =  100 * camScale;                          // 左端を少し引っ張れる余裕
  const minCamX = canvas.width  - WORLD_W * camScale - 100 * camScale;
  const maxCamY =  100 * camScale;
  const minCamY = gameH - WORLD_H * camScale - 100 * camScale;
  camX = Math.max(minCamX, Math.min(maxCamX, camX));
  camY = Math.max(minCamY, Math.min(maxCamY, camY));
}

document.getElementById("packCloseBtn").addEventListener("click",()=>{
  document.getElementById("packOverlay").classList.remove("show");
  packOpen=false;
  const wc=s2w(canvas.width/2,canvas.height/2);
  const packCenterX=wc.x, packCenterY=wc.y;

  // 配置済み予定位置を追跡（重なり防止）
  const placed=[]; // {x,y,w:CW,h:CH}

  function findFreePosAvoid(bx,by){
    const angles=[0,Math.PI/2,Math.PI,3*Math.PI/2,Math.PI/4,3*Math.PI/4,5*Math.PI/4,7*Math.PI/4];
    for(const d of [120,160,200,260,320,400]){
      for(const a of angles){
        const p=worldClamp(bx+Math.cos(a)*d, by+Math.sin(a)*d);
        const cand={x:p.x,y:p.y,w:CW,h:CH};
        const noOverlapCards=cards.every(c=>!overlap(c,cand));
        const noOverlapPlaced=placed.every(pp=>!overlap(pp,cand));
        if(noOverlapCards&&noOverlapPlaced) return p;
      }
    }
    return worldClamp(bx+140,by);
  }

  pendingPackTypes.forEach((type)=>{
    const p=findFreePosAvoid(packCenterX, packCenterY);
    placed.push({x:p.x,y:p.y,w:CW,h:CH});
    if(type==="__recipe__"){
      const idx=resolveRecipeFromPool(pendingPackRecipeFilter);
      if(idx!==null){
        gainRecipeCard(idx,p.x,p.y);
        const newC=cards[cards.length-1];
        if(newC&&newC.type==="recipe_card"){
          animations.push({id:newC.id, fromX:packCenterX, fromY:packCenterY,
            toX:p.x, toY:p.y, t:0, dur:500, onComplete:null});
          newC.x=packCenterX; newC.y=packCenterY;
        }
      }
    } else {
      spawnCardAnimated(type, packCenterX, packCenterY, p.x, p.y);
    }
  });
  pendingPackTypes=[];
  if(!dayStarted){
    dayStarted=true;
    document.getElementById("dayLabel").textContent="1日目";
  }
});

// クラフト中かどうか判定
function isCrafting(card){
  return Object.keys(progressMap).some(key=>key.split(",").map(Number).includes(card.id));
}

// カードの実際の満腹度を返す
function cardActualSat(c){
  const d=def(c.type);
  return c.partialSatiety!==undefined
    ? (c.stack-1)*(d.satiety||0)+c.partialSatiety
    : (d.satiety||0)*c.stack;
}

function startMealPhase(){
  mealPhase=true;
  mealSelectedIds.clear();
  const humans=cards.filter(c=>c.type==="human"||c.type==="baby");
  const needed=humans.length;
  const foodCards=cards.filter(c=>def(c.type).attr==="food");

  document.getElementById("mealInfo").innerHTML=
    `村人: <b>${needed}</b>人　必要な満腹度: <b>${needed*2}</b><br>食べさせる食料をタップして選択してください。`;

  const list=document.getElementById("mealFoodList");
  list.innerHTML="";

  // おまかせボタン
  const autoBtn=document.createElement("button");
  autoBtn.textContent="おまかせ";
  autoBtn.style.cssText="padding:6px 14px;font-size:13px;font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Nunito',sans-serif;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:6px;cursor:pointer;margin-bottom:4px;display:block;";
  autoBtn.addEventListener("click",()=>autoAssignFood(needed));
  list.appendChild(autoBtn);

  if(foodCards.length===0){
    const noFoodDiv=document.createElement("div");
    noFoodDiv.style.cssText="color:#faa;font-size:13px;";
    noFoodDiv.textContent="食べ物がありません！";
    list.appendChild(noFoodDiv);
  } else {
    // 同種・同満腹度でまとめる（クラフト中は別グループ）
    // グループキー: "type_satiety_crafting"
    const groups=new Map();
    for(const c of foodCards){
      const sat=cardActualSat(c);
      const crafting=isCrafting(c);
      const key=`${c.type}_${sat}_${crafting}`;
      if(!groups.has(key)) groups.set(key,{cards:[],type:c.type,sat,crafting});
      groups.get(key).cards.push(c);
    }

    // 満腹度昇順・クラフト中を後に
    const sorted=[...groups.values()].sort((a,b)=>{
      if(a.crafting!==b.crafting) return a.crafting?1:-1;
      return a.sat-b.sat;
    });

    for(const grp of sorted){
      const d=def(grp.type), as=attrSt(d.attr);
      const totalSat=grp.cards.reduce((s,c)=>s+cardActualSat(c),0);
      const el=document.createElement("div");
      el.className="meal-food-item";
      // 代表カードIDをdata属性に記録
      el.dataset.groupKey=`${grp.type}_${grp.sat}_${grp.crafting}`;
      const craftLabel=grp.crafting?'<br><span style="font-size:9px;opacity:.8;">クラフト中</span>':'';
      el.innerHTML=`<div class="mfh" style="background:${as.hd}${grp.crafting?';opacity:.7':''}">${d.label}${grp.crafting?' 🔨':''}</div>
                    <div class="mfb" style="background:${as.bg}${grp.crafting?';opacity:.7':''}">満腹度 ${totalSat}${craftLabel}</div>`;
      // 選択トグル：グループ内の全カードIDを管理
      el.addEventListener("click",()=>{
        const allSelected=grp.cards.every(c=>mealSelectedIds.has(c.id));
        if(allSelected){ grp.cards.forEach(c=>mealSelectedIds.delete(c.id)); el.classList.remove("selected"); }
        else { grp.cards.forEach(c=>mealSelectedIds.add(c.id)); el.classList.add("selected"); }
        updateMealBtn(needed);
      });
      list.appendChild(el);
    }
  }
  updateMealBtn(needed);
  document.getElementById("mealOverlay").classList.add("show");
}

// おまかせ自動割り当て
function autoAssignFood(needed){
  mealSelectedIds.clear();
  // 全食料カード要素の selected クラスをリセット
  document.querySelectorAll(".meal-food-item").forEach(el=>el.classList.remove("selected"));

  const foodCards=cards.filter(c=>def(c.type).attr==="food");
  // クラフト中は優先度最低、それ以外は満腹度が小さいものから
  const notCrafting=foodCards.filter(c=>!isCrafting(c)).sort((a,b)=>cardActualSat(a)-cardActualSat(b));
  const crafting=foodCards.filter(c=>isCrafting(c)).sort((a,b)=>cardActualSat(a)-cardActualSat(b));
  const ordered=[...notCrafting,...crafting];

  let satRemain=needed*2;
  for(const c of ordered){
    if(satRemain<=0) break;
    if(cardActualSat(c)<=0) continue; // 満腹度0はスキップ
    mealSelectedIds.add(c.id);
    satRemain-=cardActualSat(c);
  }

  // UI反映
  document.querySelectorAll(".meal-food-item[data-group-key]").forEach(el=>{
    const [type,sat,craftStr]=el.dataset.groupKey.split("_");
    const crafting=craftStr==="true";
    const grpCards=foodCards.filter(c=>c.type===type&&cardActualSat(c)===Number(sat)&&isCrafting(c)===crafting);
    if(grpCards.every(c=>mealSelectedIds.has(c.id))) el.classList.add("selected");
    else el.classList.remove("selected");
  });

  updateMealBtn(needed);
}

function selectedSatiety(){
  let s=0;
  for(const id of mealSelectedIds){
    const c=cards.find(x=>x.id===id);
    if(c) s+=cardActualSat(c);
  }
  return s;
}

function updateMealBtn(needed){
  const btn=document.getElementById("mealConfirmBtn");
  const foodCards=cards.filter(c=>def(c.type).attr==="food");
  const sat=selectedSatiety();
  const sufficient=sat>=needed*2;
  const noFood=foodCards.length===0;
  // 常に確定可能（食料不足の場合はその分の村人が死ぬ）
  btn.disabled=false;
  const dead=Math.max(0,needed-Math.floor(sat/2));
  btn.textContent=noFood ? `確定（食料なし・${needed}人死亡）`
    : sufficient ? `確定 (満腹度 ${sat}/${needed*2})`
    : `確定 (満腹度 ${sat}/${needed*2}・${dead}人死亡)`;
}

document.getElementById("mealConfirmBtn").addEventListener("click",()=>{
  const humans=cards.filter(c=>c.type==="human"||c.type==="baby");
  const needed=humans.length;
  const sat=selectedSatiety();
  const fed=Math.floor(sat/2);
  const dead=Math.max(0,needed-fed);

  // 食料があるのに必要量を満たさない場合は確認
  const foodCards=cards.filter(c=>def(c.type).attr==="food");
  const totalAvailSat=foodCards.reduce((s,c)=>s+cardActualSat(c),0);
  if(dead>0 && totalAvailSat>=needed*2){
    if(!confirm(`食料は足りているのに${dead}人の村人が死亡します。\nこのまま確定しますか？`)) return;
  }

  // 選択した食べ物カードを満腹度単位で消費し、余剰はカードに残す
  let satNeeded = needed * 2; // 必要総満腹度
  for(const id of mealSelectedIds){
    if(satNeeded<=0) break;
    const c=cards.find(x=>x.id===id);
    if(!c) continue;
    const d=def(c.type);
    // partialSatiety を考慮した実際の総満腹度
    const cardSat = c.partialSatiety!==undefined
      ? (c.stack-1)*(d.satiety||0)+c.partialSatiety
      : (d.satiety||0)*c.stack;
    if(cardSat<=satNeeded){
      // 全部消費
      satNeeded-=cardSat;
      cards=cards.filter(x=>x.id!==id);
    } else {
      // 一部消費 → 余剰満腹度をカードに残す
      const surplus=cardSat-satNeeded;
      satNeeded=0;
      const newStack=Math.floor(surplus/(d.satiety||1));
      const remSat=surplus%(d.satiety||1);
      if(newStack>0){
        c.stack=newStack;
        if(remSat>0) c.partialSatiety=remSat; else delete c.partialSatiety;
      } else if(remSat>0){
        c.stack=1;
        c.partialSatiety=remSat;
      } else {
        cards=cards.filter(x=>x.id!==id);
      }
    }
  }
  mealSelectedIds.clear();

  // 村人をdead人削除（骨ドロップあり）
  let killed=dead;
  for(let i=cards.length-1;i>=0&&killed>0;i--){
    if(cards[i].type==="human"||cards[i].type==="baby"){
      const dc=cards[i];
      cards.splice(i,1);
      dropBone(dc.x,dc.y);
      killed--;
    }
  }

  document.getElementById("mealOverlay").classList.remove("show");
  mealPhase=false;

  // 食事後にHP回復（+2、最大HP上限）
  cards.filter(c=>c.type==="human"||c.type==="baby").forEach(c=>{
    const d=def(c.type);
    if(d.maxHp!==undefined) c.hp=Math.min(d.maxHp,(c.hp??d.maxHp)+2);
  });

  const left=cards.filter(c=>c.type==="human"||c.type==="baby").length;
  if(dead>0) toast(`${dead}人の村人が飢えで死亡...`);
  else toast("全員が食事を終えました！");
  if(dayCount>=2) completeQuest("q2"); // 1日目終了後の食事
  if(left===0) triggerGameOver();
  else checkCardLimit();
});

function checkCardLimit(){
  const lim=cardLimit();
  if(cards.length<=lim){ hideSellBanner(); return; }
  startSellPhase(cards.length-lim);
}

  const recipeEntries=RECIPES

// 戦闘システム
// ════════════════════════════════════════════════
function startBattle(humanCard, mobCard){
  if(battleActive) return;
  battleActive=true;

  const hd=def(humanCard.type), md=def(mobCard.type);
  if(humanCard.hp===undefined) humanCard.hp=hd.maxHp||10;
  if(mobCard.hp===undefined)   mobCard.hp=md.maxHp||4;

  const hAtk=hd.atk||3, hDef=hd.def||1;
  const mAtk=md.atk||2, mDef=md.def||0;
  const hMaxHP=hd.maxHp||10, mMaxHP=md.maxHp||4;
  let hHP=humanCard.hp, mHP=mobCard.hp;

  // 命中率・回避率・クリティカル率（基本値）
  const HIT=0.85, EVADE=0.15, CRIT=0.15, CRIT_MULT=1.8;

  const log=document.getElementById("battleLog");
  log.innerHTML="";
  document.getElementById("bc-human-name").textContent=hd.label;
  document.getElementById("bc-mob-name").textContent=md.label;
  document.getElementById("bc-human-stats").textContent=`攻${hAtk} 防${hDef}`;
  document.getElementById("bc-mob-stats").textContent=`攻${mAtk} 防${mDef}`;
  document.getElementById("battleOverlay").classList.add("show");

  function updateUI(){
    document.getElementById("bc-human-hp").textContent=`HP ${Math.max(0,hHP)}/${hMaxHP}`;
    document.getElementById("bc-mob-hp").textContent=`HP ${Math.max(0,mHP)}/${mMaxHP}`;
    const hRatio=Math.max(0,hHP/hMaxHP), mRatio=Math.max(0,mHP/mMaxHP);
    const hBar=document.getElementById("bc-human-bar");
    const mBar=document.getElementById("bc-mob-bar");
    hBar.style.width=`${hRatio*100}%`;
    mBar.style.width=`${mRatio*100}%`;
    hBar.style.background=hRatio>0.5?"#4caf50":hRatio>0.25?"#ff9800":"#f44336";
    mBar.style.background=mRatio>0.5?"#4caf50":mRatio>0.25?"#ff9800":"#f44336";
  }
  updateUI();

  function addLog(text,cls=""){
    const p=document.createElement("p");
    if(cls) p.className=cls;
    p.textContent=text; log.appendChild(p);
    log.scrollTop=log.scrollHeight;
  }

  function calcDmg(atk,def){
    // 命中判定
    if(Math.random()>HIT) return {dmg:0,evaded:true,crit:false};
    // 相手の回避判定
    if(Math.random()<EVADE) return {dmg:0,evaded:true,crit:false};
    const base=Math.max(1,atk-def);
    const crit=Math.random()<CRIT;
    const dmg=crit?Math.ceil(base*CRIT_MULT):base;
    return {dmg,evaded:false,crit};
  }

  function doTurn(){
    // 人間の攻撃
    const h=calcDmg(hAtk,mDef);
    if(h.evaded){
      addLog(`${md.label}は回避！`,"atk-human");
    } else {
      mHP-=h.dmg;
      const tag=h.crit?" ★クリティカル！":"";
      addLog(`${hd.label}の攻撃！ ${h.dmg}ダメージ${tag}`,"atk-human");
    }
    updateUI();
    if(mHP<=0){
      addLog(`${md.label}を倒した！`,"result-win");
      humanCard.hp=Math.max(1,hHP);
      setTimeout(()=>endBattle(humanCard,mobCard,true),1200);
      return;
    }
    // 敵の攻撃（1.4秒後）
    setTimeout(()=>{
      const m=calcDmg(mAtk,hDef);
      if(m.evaded){
        addLog(`${hd.label}は回避！`,"atk-mob");
      } else {
        hHP-=m.dmg;
        const tag=m.crit?" ★クリティカル！":"";
        addLog(`${md.label}の攻撃！ ${m.dmg}ダメージ${tag}`,"atk-mob");
      }
      updateUI();
      if(hHP<=0){
        addLog(`${hd.label}は倒れた…`,"result-lose");
        humanCard.hp=0;
        setTimeout(()=>endBattle(humanCard,mobCard,false),1200);
        return;
      }
      setTimeout(doTurn,1400);
    },1000);
  }
  setTimeout(doTurn,600);
}

function endBattle(humanCard, mobCard, won){
  document.getElementById("battleOverlay").classList.remove("show");
  battleActive=false;
  if(won){
    cards=cards.filter(c=>c!==mobCard);
    const md=def(mobCard.type);
    if(md.drop&&md.drop.length>0){
      const tot=md.drop.reduce((s,d)=>s+d.w,0);
      let r=Math.random()*tot, dropType=md.drop[0].type;
      for(const d of md.drop){r-=d.w;if(r<=0){dropType=d.type;break;}}
      const pos=findFreePos(mobCard.x,mobCard.y);
      mkCard(dropType,pos.x,pos.y);
      toast(`${md.label}を倒した！ ${def(dropType).label}を入手！`);
    } else {
      toast(`${def(mobCard.type).label}を倒した！`);
    }
    completeQuest("q7");
  } else {
    cards=cards.filter(c=>c!==humanCard);
    dropBone(humanCard.x, humanCard.y);
    toast(`${def(humanCard.type).label}は力尽きた…`);
    const left=cards.filter(c=>c.type==="human"||c.type==="baby").length;
    if(left===0) triggerGameOver();
  }
}

// ════════════════════════════════════════════════
// カードアニメーション（飛び出し演出）
// ════════════════════════════════════════════════
// animations: [{card, startX, startY, targetX, targetY, t, duration}]
let animations=[];

function spawnCardAnimated(type, fromX, fromY, toX, toY, extra={}, onComplete=null){
  const c=mkCard(type, fromX, fromY, extra);
  c.x=fromX; c.y=fromY;
  animations.push({id:c.id, fromX, fromY, toX, toY, t:0, dur:500, onComplete});
  return c;
}

function updateAnimations(dt){
  const done=[];
  for(const a of animations){
    a.t=Math.min(a.t+dt, a.dur);
    const prog=easeOutCubic(a.t/a.dur);
    const c=cards.find(x=>x.id===a.id);
    if(c){
      c.x=a.fromX+(a.toX-a.fromX)*prog;
      c.y=a.fromY+(a.toY-a.fromY)*prog;
    }
    if(a.t>=a.dur){
      // アニメーション完了：最終座標に確定してonCompleteを呼ぶ
      if(c){ c.x=a.toX; c.y=a.toY; }
      done.push(a);
    }
  }
  animations=animations.filter(a=>!done.includes(a));
  // done後にonCompleteを実行（アニメーション配列更新後に）
  for(const a of done){
    if(a.onComplete) setTimeout(a.onComplete, 0);
  }
}

function isAnimating(cardId){
  return animations.some(a=>a.id===cardId);
}

function easeOutCubic(t){ return 1-(1-t)**3; }

// ════════════════════════════════════════════════
// 斥力システム
// ════════════════════════════════════════════════
function applyRepulsion(){
  const draggingIds=new Set();
  if(dragging) draggingIds.add(dragging.id);
  if(isDragGroup) groupCards.forEach(c=>draggingIds.add(c.id));

  // アニメーション中カードの「目的地グループ」も固定（斥力で動かさない）
  const animTargetIds=new Set();
  for(const a of animations){
    // toX/toY 付近にいるカードを目的地グループとして保護
    for(const c of cards){
      if(Math.abs(c.x-a.toX)<CW && Math.abs(c.y-a.toY)<CH){
        const g=connected(c);
        g.forEach(x=>animTargetIds.add(x.id));
      }
    }
  }

  const vis=new Set();
  const groups=[];
  for(const c of cards){
    if(vis.has(c.id)) continue;
    const grp=connected(c);
    grp.forEach(x=>vis.add(x.id));
    const hasDrag   = grp.some(c=>draggingIds.has(c.id));
    const hasAnim   = grp.some(c=>isAnimating(c.id));
    const isTarget  = grp.some(c=>animTargetIds.has(c.id));
    groups.push({grp, hasDrag, hasAnim, isTarget});
  }

  function groupBBox(grp){
    const minX=Math.min(...grp.map(c=>c.x));
    const minY=Math.min(...grp.map(c=>c.y));
    const maxX=Math.max(...grp.map(c=>c.x+CW));
    const maxY=Math.max(...grp.map(c=>c.y+CH));
    return {x:minX,y:minY,w:maxX-minX,h:maxY-minY,cx:(minX+maxX)/2,cy:(minY+maxY)/2};
  }

  // 離すべき最小ギャップ（BBox端から端まで）
  const MARGIN=4;
  const moves=new Map();

  for(let i=0;i<groups.length;i++){
    for(let j=i+1;j<groups.length;j++){
      const gi=groups[i], gj=groups[j];
      if(gi.hasDrag||gj.hasDrag) continue;   // ドラッグ中は除外

      const bA=groupBBox(gi.grp);
      const bB=groupBBox(gj.grp);

      // BBox同士の実際のギャップ（負=重なり）
      const gapX=Math.abs(bA.cx-bB.cx)-(bA.w+bB.w)/2;
      const gapY=Math.abs(bA.cy-bB.cy)-(bA.h+bB.h)/2;

      // どちらの方向も MARGIN 以上離れていれば完全に分離済み
      if(gapX>=MARGIN || gapY>=MARGIN) continue;

      // 押し出し方向（BBox中心間）
      let dx=bB.cx-bA.cx;
      let dy=bB.cy-bA.cy;
      if(Math.abs(dx)<0.01&&Math.abs(dy)<0.01){ dx=1; dy=0; }
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      dx/=dist; dy/=dist;

      // 重なり量：最も深い軸の重なり量を力に変換
      // MARGIN まで離すために必要な移動量を基本力とする
      const needX=Math.max(0, (bA.w+bB.w)/2+MARGIN-Math.abs(bA.cx-bB.cx));
      const needY=Math.max(0, (bA.h+bB.h)/2+MARGIN-Math.abs(bA.cy-bB.cy));
      // 実際に重なっている軸の必要量を使う（押し出し方向に合わせる）
      const need=Math.abs(dx)*needX + Math.abs(dy)*needY;
      // 1フレームで全部押し切る勢いで（ただし最大16px）
      const force=Math.min(8, Math.max(4, need));

      // アニメーション中のグループ・目的地グループは動かさない
      const iCanMove=!gi.hasAnim && !gi.isTarget;
      const jCanMove=!gj.hasAnim && !gj.isTarget;

      // 両方動けるなら半分ずつ、片方固定なら全部もう片方が動く
      const share = (iCanMove && jCanMove) ? 0.5 : 1.0;

      if(iCanMove){
        const m=moves.get(i)||{dx:0,dy:0};
        m.dx-=dx*force*share; m.dy-=dy*force*share;
        moves.set(i,m);
      }
      if(jCanMove){
        const m=moves.get(j)||{dx:0,dy:0};
        m.dx+=dx*force*share; m.dy+=dy*force*share;
        moves.set(j,m);
      }
    }
  }

  for(const [gi,mv] of moves){
    for(const c of groups[gi].grp){
      c.x=Math.max(-CW*2, Math.min(WORLD_W+CW*2, c.x+mv.dx));
      c.y=Math.max(-CH*2, Math.min(WORLD_H+CH*2, c.y+mv.dy));
    }
  }
}
function overlap(a,b){
  return !(a.x+a.w<=b.x||b.x+b.w<=a.x||a.y+a.h<=b.y||b.y+b.h<=a.y);
}

// ── クラフト通過リセット修正の核心 ──────────────
// グループ構築時にドラッグ中カード（単体ドラッグ）を除外して判定する。
// これにより、ドラッグ中カードが通過してもグループキーが変わらない。
function connectedExcluding(start, excludeIds){
  const vis=new Set(), stack=[start], grp=[];
  while(stack.length){
    const cur=stack.pop();
    if(vis.has(cur.id))continue;
    vis.add(cur.id); grp.push(cur);
    for(const o of cards){
      if(!vis.has(o.id)&&!excludeIds.has(o.id)&&overlap(cur,o)) stack.push(o);
    }
  }
  return grp;
}

function connected(start){
  return connectedExcluding(start, new Set());
}

// クラフト進行管理用：ドラッグ中カードを除外してグループ構築
function allGroupsForCraft(){
  let excludeIds;
  if(dragging && !isDragGroup){
    excludeIds = new Set([dragging.id]);
  } else if(dragging && isDragGroup){
    excludeIds = new Set(groupCards.map(c=>c.id));
  } else {
    excludeIds = new Set();
  }
  // アニメーション中カードもクラフトグループから除外（通過でリセットしない）
  animations.forEach(a=>excludeIds.add(a.id));

  const vis=new Set(), groups=[];
  for(const c of cards){
    if(vis.has(c.id)) continue;
    if(excludeIds.has(c.id)) continue;
    const g=connectedExcluding(c, excludeIds);
    g.forEach(x=>vis.add(x.id));
    groups.push(g);
  }
  return groups;
}

function allGroups(){
  const vis=new Set(), groups=[];
  for(const c of cards){
    if(vis.has(c.id))continue;
    const g=connected(c);
    g.forEach(x=>vis.add(x.id));
    groups.push(g);
  }
  return groups;
}

function gKey(grp){ return grp.map(c=>c.id).sort((a,b)=>a-b).join(","); }

function matchRecipe(grp){
  const cnt={};
  for(const c of grp) cnt[c.type]=(cnt[c.type]||0)+1;
  for(const r of RECIPES){
    let ok=true;
    for(const k in r.inputs) if(cnt[k]!==r.inputs[k]){ok=false;break;}
    if(!ok) continue;
    for(const k in cnt) if(r.inputs[k]===undefined){ok=false;break;}
    if(ok) return r;
  }
  return null;
}

// 現在のカメラ可視範囲内にワールド座標をクランプ
function viewClamp(wx, wy){
  // カメラ可視範囲をワールド座標で計算
  const gameH = canvas.height - UI_H;
  const left   = Math.max(0, -camX / camScale);
  const top    = Math.max(0, -camY / camScale);
  const right  = Math.min(WORLD_W, (canvas.width  - camX) / camScale);
  const bottom = Math.min(WORLD_H, (gameH         - camY) / camScale);
  return {
    x: Math.max(left, Math.min(right  - CW, wx)),
    y: Math.max(top,  Math.min(bottom - CH, wy)),
  };
}

// ワールド境界内クランプ（カード手動移動用・既存位置修正用）
function worldClamp(wx, wy){
  return {
    x: Math.max(0, Math.min(WORLD_W - CW, wx)),
    y: Math.max(0, Math.min(WORLD_H - CH, wy)),
  };
}

function findFreePos(bx,by){
  const angles=[0,Math.PI/2,Math.PI,3*Math.PI/2,Math.PI/4,3*Math.PI/4,5*Math.PI/4,7*Math.PI/4];
  for(const d of [120,160,200,260]){
    for(const a of angles){
      const p=viewClamp(bx+Math.cos(a)*d, by+Math.sin(a)*d);
      const cand={x:p.x,y:p.y,w:CW,h:CH};
      if(cards.every(c=>!overlap(c,cand))) return p;
    }
  }
  return viewClamp(bx+140,by);
}

function addEmeralds(n,sx,sy){
  const em=cards.find(c=>c.type==="emerald");
  if(em){ em.stack+=n; }
  else {
    const p=findFreePos(sx||INIT_WX, sy||INIT_WY);
    const c=mkCard("emerald",p.x,p.y); c.stack=n;
  }
}

let toastTmr=null;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove("show"),2500);
}

// ════════════════════════════════════════════════
// タッチ
// ════════════════════════════════════════════════
function touchW(t){ return s2w(t.clientX, t.clientY-UI_H); }

function hitCard(wx,wy){
  for(let i=cards.length-1;i>=0;i--){
    const c=cards[i];
    if(isAnimating(c.id)) continue; // アニメーション中はドラッグ不可
    if(wx>=c.x&&wx<=c.x+c.w&&wy>=c.y&&wy<=c.y+c.h) return {card:c,idx:i};
  }
  return null;
}

// グループ内で最もYが小さいカード（一番「上」＝スタックの底）
function bottomCard(grp){ return grp.reduce((a,b)=>a.y<b.y?a:b); }

canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(mealPhase||gameOver) return;

  if(e.touches.length===2){
    dragging=null; isDragGroup=false;
    pinchActive=true; panActive=false;
    pinchStartDist=tdist(e.touches[0],e.touches[1]);
    pinchStartScale=camScale;
    const mid=tmid(e.touches[0],e.touches[1]);
    pinchMidS={x:mid.x, y:mid.y-UI_H};
    pinchMidW=s2w(pinchMidS.x,pinchMidS.y);
    return;
  }
  if(e.touches.length===1&&!pinchActive){
    const t=e.touches[0];
    const wpos=touchW(t);
    const hit=hitCard(wpos.x,wpos.y);
    if(hit){
      const {card,idx}=hit;
      const grp=connected(card);
      // タップしたカードのYより大きい（上に積まれた）カードを収集
      const tapY=card.y;
      const moveCards=grp.filter(c=>c.y>=tapY);

      // グループが複数かつ、タップカードが最下位（Y最小）の場合もグループ全体移動
      const isBottomCard = grp.length>1 && grp.every(c=>c.y>=tapY);

      if(grp.length>1 && (moveCards.length>1 || isBottomCard)){
        // ── グループ移動 ──
        // isBottomCard の場合はグループ全体を移動
        const actualMove = isBottomCard ? [...grp] : moveCards;
        const notMoved=cards.filter(c=>!actualMove.includes(c));
        const sortedMove=[...actualMove].sort((a,b)=>a.y-b.y);
        cards.splice(0,cards.length,...notMoved,...sortedMove);

        isDragGroup=true;
        dragging=card;
        groupCards=[...sortedMove];
        groupOffsets=sortedMove.map(c=>({dx:wpos.x-c.x,dy:wpos.y-c.y}));
      } else {
        // ── 単体移動（孤立カード、またはグループ最上位カードの単独引き抜き） ──
        const grpBefore=connected(card);
        const restGrp=grpBefore.filter(c=>c.id!==card.id);

        isDragGroup=false; dragging=card;
        dragOffX=wpos.x-card.x; dragOffY=wpos.y-card.y;
        cards.splice(idx,1); cards.push(card);
        cancelCraftForCard(card);

        // 残りグループでレシピが成立すればクラフト開始
        if(restGrp.length>0){
          const restRecipe=matchRecipe(restGrp);
          if(restRecipe){
            const rk=gKey(restGrp);
            if(!progressMap[rk]) progressMap[rk]={progress:0,recipe:restRecipe};
          }
        }
      }
    } else {
      panActive=true;
      panStartX=t.clientX; panStartY=t.clientY;
      panCamX=camX; panCamY=camY;
    }
  }
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(mealPhase||gameOver) return;

  if(e.touches.length===2&&pinchActive){
    const dist=tdist(e.touches[0],e.touches[1]);
    const newSc=Math.max(MIN_SC,Math.min(MAX_SC,pinchStartScale*(dist/pinchStartDist)));
    camScale=newSc;
    camX=pinchMidS.x-pinchMidW.x*camScale;
    camY=pinchMidS.y-pinchMidW.y*camScale;
    clampCam();
    return;
  }
  if(!dragging&&panActive&&e.touches.length===1){
    const t=e.touches[0];
    camX=panCamX+(t.clientX-panStartX);
    camY=panCamY+(t.clientY-panStartY);
    clampCam();
    return;
  }
  if(!dragging) return;

  const t=e.touches[0];
  const rawY=t.clientY;
  const wpos=touchW(t);

  if(isDragGroup){
    groupCards.forEach((c,i)=>{
      const np=viewClamp(wpos.x-groupOffsets[i].dx, wpos.y-groupOffsets[i].dy);
      c.x=np.x; c.y=np.y;
    });
  } else {
    const np=viewClamp(wpos.x-dragOffX, wpos.y-dragOffY);
    dragging.x=np.x; dragging.y=np.y;
  }

  const d=def(dragging.type);
  document.getElementById("trashZone").classList.toggle("active",rawY<UI_H&&!!d.sell);
  document.getElementById("packShopA").classList.toggle("active",rawY<UI_H&&dragging.type==="emerald");
  document.getElementById("packShopB").classList.toggle("active",rawY<UI_H&&dragging.type==="emerald");
},{passive:false});

canvas.addEventListener("touchend",e=>{
  e.preventDefault();
  if(e.touches.length<2) pinchActive=false;
  if(e.touches.length===0) panActive=false;
  if(mealPhase||gameOver||!dragging) return;

  const t=e.changedTouches[0];
  document.getElementById("trashZone").classList.remove("active");
  document.getElementById("packShopA").classList.remove("active");
  document.getElementById("packShopB").classList.remove("active");

  if(t.clientY<UI_H){
    handleUIZoneDrop(t);
  } else {
    const dragDef=def(dragging.type);

    // ── ニンジン+ウサギ：手なずけ判定（双方向） ──
    if(!isDragGroup){
      let carrotCard=null, rabbitCard=null;
      if(dragging.type==="carrot"){
        rabbitCard=cards.find(c=>c!==dragging&&overlap(dragging,c)&&c.type==="rabbit");
        carrotCard=dragging;
      } else if(dragging.type==="rabbit"){
        carrotCard=cards.find(c=>c!==dragging&&overlap(dragging,c)&&c.type==="carrot");
        rabbitCard=dragging;
      }
      if(carrotCard&&rabbitCard){
        if(Math.random()<0.5){
          rabbitCard.type="tamed_rabbit";
          delete rabbitCard.hp;
          toast("うさぎを手なずけた！");
          completeQuest("q8");
        } else {
          toast("失敗…ウサギに逃げられた！");
        }
        cards=cards.filter(c=>c!==carrotCard);
        dragging=null; isDragGroup=false; groupCards=[]; groupOffsets=[];
        return;
      }
    }

    // ── 戦闘判定：human→hostile または hostile→human ──
    if(!isDragGroup){
      const isHuman=dragDef.attr==="human";
      const isHostile=dragDef.attr==="hostile";

      if(isHuman || isHostile){
        // ドラッグ中カードと矩形が重なっている相手カードを探す
        const partner=cards.find(c=>{
          if(c===dragging) return false;
          if(!overlap(dragging,c)) return false;
          const cd=def(c.type);
          return isHuman ? cd.attr==="hostile" : cd.attr==="human";
        });
        if(partner){
          const humanCard=isHuman?dragging:partner;
          const mobCard  =isHuman?partner:dragging;
          dragging=null; isDragGroup=false; groupCards=[]; groupOffsets=[];
          startBattle(humanCard,mobCard);
          return;
        }
      }

      // 敵カードは人間以外とは重ねられない → 重なった場合は弾く
      if(isHostile){
        const bad=cards.find(c=>c!==dragging&&overlap(dragging,c)&&def(c.type).attr!=="human");
        if(bad){
          // 元の位置には戻せないので近くの空き地に移動
          const p=findFreePos(dragging.x,dragging.y);
          dragging.x=p.x; dragging.y=p.y;
          dragging=null; isDragGroup=false; groupCards=[]; groupOffsets=[];
          return;
        }
      }
    }

    // 通常のスタック補正・クラフト開始
    snapStack(dragging);
    tryStartCraft(dragging);
  }
  dragging=null; isDragGroup=false; groupCards=[]; groupOffsets=[];
},{passive:false});

function tdist(a,b){ const dx=a.clientX-b.clientX,dy=a.clientY-b.clientY; return Math.sqrt(dx*dx+dy*dy); }
function tmid(a,b){ return {x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2}; }

function cancelCraftForCard(card){
  for(const key of Object.keys(progressMap)){
    if(key.split(",").map(Number).includes(card.id)) delete progressMap[key];
  }
}

function handleUIZoneDrop(t){
  const d=def(dragging.type);
  const sellCards=isDragGroup?groupCards:[dragging];

  if(dragging.type==="emerald"){
    const rB=document.getElementById("packShopB").getBoundingClientRect();
    const isPackB=(t.clientX>=rB.left&&t.clientX<=rB.right);
    const packId=isPackB?"packShopB":"packShopA";
    if(!unlockedPacks.has(packId)){ toast("このパックはまだ解放されていません"); return; }
    const pool=isPackB?PACK_B:PACK_A;
    const recipeFilter=isPackB?PACK_B_RECIPES:PACK_A_RECIPES;
    const cost=isPackB?4:3;
    if(dragging.stack>=cost){
      const savedX=dragging.x, savedY=dragging.y;
      dragging.stack-=cost;
      if(dragging.stack<=0){
        cards=cards.filter(c=>c!==dragging);
      } else {
        // 残ったエメラルドを空き位置に移動
        const p=findFreePos(savedX, savedY);
        dragging.x=p.x; dragging.y=p.y;
      }
      openPackOverlay(drawPool(pool,3,recipeFilter),recipeFilter);
      toast("パックを購入しました！");
    } else { toast(`💎が${cost}個必要です`); }
    return;
  }

  let total=0, sx=dragging.x, sy=dragging.y;
  for(const sc of sellCards){
    const sd=def(sc.type);
    if(sd.sell!==null&&sd.sell>=0&&sc.type!=="human"){
      total+=(sd.sell)*sc.stack;
      cards=cards.filter(c=>c!==sc);
    }
  }
  if(isDragGroup) dragging=null;
  if(total>0){ addEmeralds(total,sx,sy); toast(`売却: 💎×${total}`); completeQuest("q4"); updateSellBanner(); }
}

// ── スタック位置補正 ──────────────────────────
function snapStack(dropped){
  const movingIds = isDragGroup ? new Set(groupCards.map(c=>c.id)) : new Set([dropped.id]);
  const externalOverlap = cards.filter(c=>!movingIds.has(c.id) && overlap(dropped, c));
  if(externalOverlap.length===0) return;

  // ── 重ねガード ──────────────────────────────
  // 1) 敵カードには（戦闘開始以外で）何も重ねられない
  if(externalOverlap.some(c=>def(c.type).attr==="hostile")){
    const p=findFreePos(dropped.x,dropped.y);
    dropped.x=p.x; dropped.y=p.y;
    return;
  }
  // 2) 敵カード自身は人間以外とは重ねられない
  const dragCards=isDragGroup?groupCards:[dropped];
  if(dragCards.some(c=>def(c.type).attr==="hostile")){
    if(externalOverlap.some(c=>def(c.type).attr!=="human")){
      const p=findFreePos(dropped.x,dropped.y);
      dropped.x=p.x; dropped.y=p.y;
      return;
    }
  }

  // 外部カードから連結グループを構築
  const vis=new Set(movingIds);
  const stackBase=[];
  const queue=[externalOverlap[0]];
  while(queue.length){
    const cur=queue.pop();
    if(vis.has(cur.id)) continue;
    vis.add(cur.id); stackBase.push(cur);
    for(const o of cards) if(!vis.has(o.id)&&overlap(cur,o)) queue.push(o);
  }
  if(stackBase.length===0) return;

  stackBase.sort((a,b)=>a.y-b.y);
  const baseX = stackBase[0].x;
  const maxY  = Math.max(...stackBase.map(c=>c.y));

  if(isDragGroup){
    const sorted=[...groupCards].sort((a,b)=>a.y-b.y);
    sorted.forEach((c,i)=>{
      const p=viewClamp(baseX, maxY+24+i*24);
      c.x=p.x; c.y=p.y;
    });
  } else {
    const p=viewClamp(baseX, maxY+24);
    dropped.x=p.x; dropped.y=p.y;
  }
}

// ── クラフト開始（ドロップ時のみ） ───────────
function tryStartCraft(dropped){
  const grp=connected(dropped);
  const recipe=matchRecipe(grp);
  if(!recipe) return;
  const key=gKey(grp);
  if(progressMap[key]) return;
  progressMap[key]={progress:0,recipe};
}

// ════════════════════════════════════════════════
// 更新
// ════════════════════════════════════════════════
function update(dt){
  if(mealPhase||gameOver||packOpen||battleActive) return;
  updateCardCount();
  updateAnimations(dt); // アニメーション更新（常時）
  applyRepulsion();     // 斥力（常時、ポーズ・売却中も動作）
  if(sellPhase){ updateSellBanner(); return; }

  const eff=dt*gameSpeed;
  if(eff<=0) return;

  // 日時タイマー（初期パック開封後のみ）
  if(dayStarted){
    dayTimer+=eff;
    const ratio=Math.min(dayTimer/DAY_MS,1);
    document.getElementById("dayBar").style.width=(ratio*100)+"%";
    document.getElementById("dayLabel").textContent=`${dayCount}日目`;
    if(dayTimer>=DAY_MS){
      dayTimer=0; dayCount++;
      startMealPhase();
      return;
    }
  }

  // ── クラフト更新 ──────────────────────────
  const newPM={};
  const byKey={};
  for(const g of allGroupsForCraft()) byKey[gKey(g)]=g;

  // グループドラッグ中のカードIDセット
  const dragGroupIdSet = (isDragGroup && groupCards.length>0)
    ? new Set(groupCards.map(c=>c.id))
    : new Set();

  for(const [key,info] of Object.entries(progressMap)){
    // グループドラッグ中：そのグループがクラフト中グループに完全に含まれる場合は進捗を維持
    const craftIds = new Set(key.split(",").map(Number));
    if(isDragGroup && dragGroupIdSet.size>0){
      const allInDrag = [...craftIds].every(id=>dragGroupIdSet.has(id));
      if(allInDrag){
        const npDrag = info.progress + eff;
        if(npDrag >= info.recipe.time*1000){
          newPM[key]={progress:info.recipe.time*1000, recipe:info.recipe};
        } else {
          newPM[key]={progress:npDrag, recipe:info.recipe};
        }
        continue;
      }
    }

    const grp=byKey[key];
    if(!grp||gKey(grp)!==key) continue;

    const recipe=matchRecipe(grp);
    if(!recipe) continue;
    if(RECIPES.indexOf(recipe)!==RECIPES.indexOf(info.recipe)) continue;

    const np=info.progress+eff;
    if(np>=recipe.time*1000){
      // ── 完成 ──
      const keepAttrs=recipe.keepAttrs||[];
      const toRemove=[], toKeep=[], autoRestart=[];

      // グループをY順（小→大）でソートして基準位置を決める
      const sortedGrp=[...grp].sort((a,b)=>a.y-b.y);
      const baseCard=sortedGrp[0]; // Y最小（一番上）が基準
      const baseX=baseCard.x, baseY=baseCard.y;

      for(const c of grp){
        const d=def(c.type);
        if(keepAttrs.includes(d.attr)){
          toKeep.push(c);
        } else if(d.attr==="resource"){
          c.uses=(c.uses||0)+1;
          if(c.maxUses&&c.uses>=c.maxUses){ toRemove.push(c); }
          else { toKeep.push(c); autoRestart.push(c); }
        } else if(d.attr==="tool"){
          c.uses=(c.uses||0)+1;
          if(c.maxUses&&c.uses>=c.maxUses){ toRemove.push(c); }
          else { toKeep.push(c); }
        } else {
          toRemove.push(c);
        }
      }

      cards=cards.filter(c=>!toRemove.includes(c));

      // keepカードをスタック形式で整列（横揃え・縦24pxずつ）
      toKeep.forEach((c,i)=>{
        const p=worldClamp(baseX, baseY+i*24);
        c.x=p.x; c.y=p.y;
      });

      // 出力カード生成（生成元から飛び出す演出）
      const outType=pickOut(recipe);

      // 同種カードが近くにあればそのスタック末尾を目的地にする
      const SNAP_DIST=250;
      let snapTarget=null;
      {
        const sameType=cards.filter(c=>c.type===outType);
        let nearestDist=Infinity;
        for(const sc of sameType){
          const cx=(sc.x+CW/2)-baseX;
          const cy=(sc.y+CH/2)-baseY;
          const dist=Math.sqrt(cx*cx+cy*cy);
          if(dist<nearestDist){
            const grpCheck=connected(sc);
            const allSame=grpCheck.every(gc=>gc.type===outType);
            if(allSame){ nearestDist=dist; snapTarget=sc; }
          }
        }
        if(nearestDist>=SNAP_DIST) snapTarget=null;
      }

      let toX, toY;
      if(snapTarget){
        const grpN=connected(snapTarget);
        grpN.sort((a,b)=>a.y-b.y);
        const maxYN=Math.max(...grpN.map(c=>c.y));
        const sp=worldClamp(grpN[0].x, maxYN+24);
        toX=sp.x; toY=sp.y;
      } else {
        const pos=findFreePos(baseX,baseY);
        toX=pos.x; toY=pos.y;
      }

      // アニメーション完了後の処理
      const afterAnim=()=>{
        const newCard=cards.find(c=>c._spawnId===spawnId);
        if(!newCard) return;
        delete newCard._spawnId;

        // スナップ先が設定されていれば、完了時点の実際の座標に再配置（斥力でズレていてもOK）
        if(snapTarget && cards.includes(snapTarget)){
          const grpN=connected(snapTarget);
          grpN.sort((a,b)=>a.y-b.y);
          const maxYN=Math.max(...grpN.map(c=>c.y));
          const sp=worldClamp(grpN[0].x, maxYN);
          newCard.x=sp.x; newCard.y=sp.y;
        }

        // グループ化後にレシピが成立すればクラフト開始
        setTimeout(()=>{
          const snapGrp=connected(newCard);
          const snapRecipe=matchRecipe(snapGrp);
          if(snapRecipe){
            const sk=gKey(snapGrp);
            if(!progressMap[sk]) progressMap[sk]={progress:0,recipe:snapRecipe};
          }
        }, 50);

        // 自動再開（資源残存 or 全keepレシピ）
        if(shouldAutoRestart){
          const survivors=toKeep.filter(c=>cards.includes(c));
          if(survivors.length>0){
            const sortedS=[...survivors].sort((a,b)=>a.y-b.y);
            const refX=sortedS[0].x, refY=sortedS[0].y;
            sortedS.forEach((c,i)=>{
              const p=worldClamp(refX, refY+i*24);
              c.x=p.x; c.y=p.y;
            });
            const newGrp=connected(survivors[0]);
            const newRecipe=matchRecipe(newGrp);
            if(newRecipe){
              const nk=gKey(newGrp);
              if(!progressMap[nk]) progressMap[nk]={progress:0,recipe:newRecipe};
            }
          }
        }
      };

      // spawnIdで後からカードを特定できるようにする
      const spawnId=nextId;
      const newCard=spawnCardAnimated(outType, baseX, baseY, toX, toY, {}, afterAnim);
      newCard._spawnId=spawnId;

      // ── クエストトリガー（クラフト完了時） ──
      if(outType==="wood")       completeQuest("q3");
      if(outType==="stick"&&recipe.inputs.wood) completeQuest("q10");
      if(outType==="apple_tree") completeQuest("q5");
      if(outType==="flour"||outType==="carrot") completeQuest("q6");
      if(outType==="baby")       completeQuest("q9");

      // 資源が残っている場合 or 全keepレシピのフラグ（afterAnimで使用）
      const shouldAutoRestart = autoRestart.length>0 || toRemove.length===0;
    } else {
      newPM[key]={progress:np,recipe};
    }
  }
  progressMap=newPM;
}

// ════════════════════════════════════════════════
// 描画
// ════════════════════════════════════════════════
function drawCard(c,craftProg,craftTotal){
  const d=def(c.type), as=attrSt(d.attr);
  const {x,y}=c;
  const isDrag=(c===dragging)||(isDragGroup&&groupCards.includes(c));
  const r=8;

  ctx.save();
  if(isDrag){ ctx.shadowColor="rgba(0,0,0,.45)"; ctx.shadowBlur=14; ctx.shadowOffsetY=5; }

  // ══ レシピカード専用描画 ══
  if(d.attr==="recipe"){
    const r=c.recipeIdx!==undefined?RECIPES[c.recipeIdx]:null;
    const outLabel=r?def(r.variants[0].out).label:"レシピ";
    const as2=attrSt("recipe");
    const r2=8;

    // カード背景
    ctx.beginPath(); ctx.roundRect(x,y,CW,CH,r2);
    ctx.fillStyle=as2.bg; ctx.fill();

    // ヘッダー（生成物名）
    ctx.beginPath(); ctx.roundRect(x,y,CW,24,[r2,r2,0,0]);
    ctx.fillStyle=as2.hd; ctx.fill();
    ctx.fillStyle="#dde";
    ctx.font="bold 10px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif";
    ctx.textAlign="center";
    ctx.fillText(outLabel,x+CW/2,y+16);

    // 属性バッジ
    ctx.fillStyle="rgba(0,0,0,.2)";
    ctx.beginPath(); ctx.roundRect(x+3,y+27,30,13,3); ctx.fill();
    ctx.fillStyle="#ddd";
    ctx.font="8px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif";
    ctx.textAlign="center";
    ctx.fillText("レシピ",x+18,y+37);

    // 売却値
    ctx.fillStyle="rgba(0,0,0,.18)";
    ctx.beginPath(); ctx.roundRect(x+CW-34,y+27,31,13,3); ctx.fill();
    ctx.fillStyle="#dde";
    ctx.font="9px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif";
    ctx.textAlign="center";
    ctx.fillText("💎1",x+CW-18,y+37);

    // 素材リスト（改行）
    if(r){
      const inputLines=Object.entries(r.inputs).map(([k,v])=>`${def(k).label} ×${v}`);
      ctx.fillStyle="rgba(255,255,255,.12)";
      ctx.beginPath(); ctx.roundRect(x+3,y+43,CW-6,CH-47,3); ctx.fill();
      ctx.fillStyle="#cce";
      ctx.font="8px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif";
      ctx.textAlign="center";
      inputLines.forEach((line,idx)=>{
        ctx.fillText(line,x+CW/2,y+54+idx*11);
      });
    }

    // ドラッグ枠
    if(isDrag){
      ctx.strokeStyle="#e8b84b"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(x,y,CW,CH,r2); ctx.stroke();
    }
    ctx.restore();
    return; // 通常描画をスキップ
  }

  // 通常カード描画
  ctx.beginPath(); ctx.roundRect(x,y,CW,CH,r);
  ctx.fillStyle=as.bg; ctx.fill();

  ctx.beginPath(); ctx.roundRect(x,y,CW,24,[r,r,0,0]);
  ctx.fillStyle=as.hd; ctx.fill();

  ctx.fillStyle=as.light?"#eee":"#fff";
  ctx.font="bold 11px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif"; ctx.textAlign="center";
  ctx.fillText(d.label,x+CW/2,y+16);

  // 属性バッジ
  ctx.fillStyle="rgba(0,0,0,.2)";
  ctx.beginPath(); ctx.roundRect(x+3,y+27,30,13,3); ctx.fill();
  ctx.fillStyle=as.light?"#ddd":"#fff";
  ctx.font="8px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif"; ctx.textAlign="center";
  ctx.fillText(as.label,x+18,y+37);

  // 売却値
  if(d.sell!==null&&d.sell>=0){
    ctx.fillStyle="rgba(0,0,0,.18)";
    ctx.beginPath(); ctx.roundRect(x+CW-34,y+27,31,13,3); ctx.fill();
    ctx.fillStyle=as.light?"#dde":"#fff";
    ctx.font="9px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif"; ctx.textAlign="center";
    ctx.fillText("💎"+d.sell,x+CW-18,y+37);
  }

  // 人間・敵のHPバー
  if((d.attr==="human"||d.attr==="hostile")&&d.maxHp){
    const hp=c.hp!==undefined?c.hp:d.maxHp;
    const ratio=Math.max(0,hp/d.maxHp);
    const bx=x+4,by=y+44,bw=CW-8,bh=6;
    ctx.fillStyle="rgba(0,0,0,.3)";
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,3); ctx.fill();
    ctx.fillStyle=ratio>0.5?"#4caf50":ratio>0.25?"#ff9800":"#f44336";
    ctx.beginPath(); ctx.roundRect(bx,by,bw*ratio,bh,3); ctx.fill();
    ctx.fillStyle=as.light?"#ddd":"#333";
    ctx.font="8px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif"; ctx.textAlign="center";
    ctx.fillText(`HP ${hp}/${d.maxHp}`,x+CW/2,by+5);
  }

  // 食べ物：満腹度
  if(d.attr==="food"&&d.satiety!==null){
    ctx.fillStyle="rgba(255,255,255,.2)";
    ctx.beginPath(); ctx.roundRect(x+3,y+43,CW-6,14,3); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 10px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif"; ctx.textAlign="center";
    const dispSat = c.partialSatiety!==undefined
      ? (c.stack>1 ? `満腹度 ${(c.stack-1)*d.satiety}+${c.partialSatiety}` : `満腹度 ${c.partialSatiety}`)
      : `満腹度 ${d.satiety}`;
    ctx.fillText(dispSat,x+CW/2,y+53);
  }

  // 道具耐久バー
  if(d.attr==="tool"&&d.maxUses){
    const used=c.uses||0;
    const ratio=Math.max(0,(d.maxUses-used)/d.maxUses);
    const bx=x+4,by=y+44,bw=CW-8,bh=7;
    ctx.fillStyle="rgba(0,0,0,.25)";
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,3); ctx.fill();
    const rv=Math.floor(255*(1-ratio)),gv=Math.floor(200*ratio);
    ctx.fillStyle=`rgb(${rv},${gv},60)`;
    ctx.beginPath(); ctx.roundRect(bx,by,bw*ratio,bh,3); ctx.fill();
  }

  // スタック数
  if(c.stack>1){
    ctx.fillStyle="rgba(0,0,0,.6)";
    ctx.beginPath(); ctx.roundRect(x+CW-28,y+CH-22,25,18,4); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 11px 'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif"; ctx.textAlign="center";
    ctx.fillText("×"+c.stack,x+CW-15,y+CH-9);
  }

  // クラフト進行バー（秒数なし）
  if(craftTotal>0){
    const ratio=Math.min(craftProg/craftTotal,1);
    const bx=x+4,by=y+CH-12,bw=CW-8,bh=7;
    ctx.fillStyle="rgba(0,0,0,.3)";
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,4); ctx.fill();
    const g=ctx.createLinearGradient(bx,0,bx+bw,0);
    g.addColorStop(0,"#4ecdc4"); g.addColorStop(1,"#45b7d1");
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.roundRect(bx,by,bw*ratio,bh,4); ctx.fill();
  }

  if(isDrag){
    ctx.strokeStyle="#e8b84b"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(x,y,CW,CH,r); ctx.stroke();
  }
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#b8e0b2";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(camX,UI_H+camY);
  ctx.scale(camScale,camScale);

  // ドット格子
  const step=40;
  const tl=s2w(0,0), br=s2w(canvas.width,canvas.height);
  ctx.fillStyle="rgba(0,80,0,.06)";
  for(let gx=Math.floor(tl.x/step)*step;gx<=br.x;gx+=step)
    for(let gy=Math.floor(tl.y/step)*step;gy<=br.y;gy+=step){
      ctx.beginPath(); ctx.arc(gx,gy,1.2,0,Math.PI*2); ctx.fill();
    }

  // クラフト情報マップ
  const ci=new Map();
  for(const [key,info] of Object.entries(progressMap))
    for(const id of key.split(",").map(Number))
      ci.set(id,{progress:info.progress,total:info.recipe.time*1000});

  for(const c of cards){
    const inf=ci.get(c.id);
    drawCard(c,inf?inf.progress:0,inf?inf.total:0);
  }
  ctx.restore();
}

// ════════════════════════════════════════════════
// ループ
// ════════════════════════════════════════════════
function loop(t){
  const dt=Math.min(t-lastTime,100);
  lastTime=t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lastTime=t;requestAnimationFrame(loop);});
</script>
