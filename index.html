<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Card Craft</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { overflow:hidden; font-family:'Georgia',serif; background:#b8e0b2; touch-action:none; }
canvas { display:block; }

#ui {
  position:fixed; top:0; left:0; width:100%; height:52px;
  background:linear-gradient(180deg,#1a1a2e,#16213e);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 10px; z-index:10;
  border-bottom:2px solid #e8b84b;
  box-shadow:0 2px 8px rgba(0,0,0,.5); gap:6px;
}
.ui-zone {
  display:flex; align-items:center; justify-content:center; gap:4px;
  font-size:11px; border-radius:6px; padding:4px 8px; height:36px;
  transition:background .2s,border-color .2s; flex-shrink:0; white-space:nowrap;
}
#trashZone {
  color:#ccc; background:rgba(255,255,255,.07);
  border:1px dashed rgba(255,255,255,.3); min-width:60px;
}
#trashZone.active { background:rgba(255,80,80,.3); border-color:#ff5050; color:#ff9090; }

#packShopsRow { display:flex; gap:5px; flex:1; justify-content:center; }
.pack-shop-zone {
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:1px; font-size:10px; border-radius:6px;
  padding:2px 7px; height:36px; white-space:nowrap; line-height:1.3;
}
.pack-shop-zone .ps-name { font-weight:bold; font-size:11px; }
.pack-shop-zone .ps-cost { font-size:9px; opacity:.8; }
#packShopA { color:#e8d080; background:rgba(232,184,75,.1); border:1px dashed rgba(232,184,75,.5); }
#packShopA.active { background:rgba(232,184,75,.35); border-color:#e8b84b; }
#packShopB { color:#a0d0ff; background:rgba(80,160,255,.1); border:1px dashed rgba(80,160,255,.4); }
#packShopB.active { background:rgba(80,160,255,.3); border-color:#60b0ff; }

/* 日数バー */
#dayBarWrap {
  position:fixed; top:52px; left:0; width:100%; height:8px;
  background:rgba(0,0,0,.25); z-index:9;
}
#dayBar { height:100%; width:0%; background:linear-gradient(90deg,#f0c040,#f08020); }
#dayLabel {
  position:fixed; top:53px; left:50%; transform:translateX(-50%);
  font-size:10px; color:#ffe; text-shadow:0 1px 3px #000;
  pointer-events:none; z-index:9; white-space:nowrap; line-height:1; padding-top:1px;
}

/* 初期パック */
#initPackCard {
  position:fixed; bottom:70px; right:16px;
  width:86px; height:108px;
  background:linear-gradient(135deg,#2a2a4a,#1a1a3a);
  border:2px solid #e8b84b; border-radius:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#e8b84b; font-size:11px; font-weight:bold;
  cursor:pointer; z-index:20; box-shadow:0 4px 12px rgba(0,0,0,.5);
  gap:5px; user-select:none;
}
#initPackCard .pi { font-size:30px; }
#initPackCard sub { font-size:9px; color:#aaa; font-weight:normal; }
#initPackCard:active { transform:scale(.95); }

/* パック開封 */
#packOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); z-index:100;
  flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#packOverlay.show { display:flex; }
#packOverlay h2 { color:#e8b84b; font-size:20px; letter-spacing:2px; }
#packCards { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.pack-card-preview {
  width:80px; height:100px; border-radius:8px; overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
  opacity:0; transform:scale(.6); transition:opacity .25s,transform .25s;
}
.pack-card-preview.pop { opacity:1; transform:scale(1); }
.pch { height:24px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; }
.pcb { flex:1; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; padding:4px; }
#packCloseBtn {
  padding:10px 32px; font-size:15px; font-family:Georgia,serif;
  background:linear-gradient(135deg,#e8b84b,#c49a2a);
  color:#1a1a1a; border:none; border-radius:8px; font-weight:bold; cursor:pointer;
}

/* 食事ターン */
#mealOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.8); z-index:200;
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#mealOverlay.show { display:flex; }
#mealOverlay h2 { color:#f0c040; font-size:20px; letter-spacing:1px; }
#mealInfo { color:#eee; font-size:13px; text-align:center; line-height:1.8; }
#mealFoodList {
  display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:90vw;
}
.meal-food-item {
  width:72px; height:90px; border-radius:7px; overflow:hidden;
  cursor:pointer; border:2px solid transparent;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  transition:border-color .15s,transform .15s; user-select:none;
}
.meal-food-item.selected { border-color:#f0c040; transform:scale(1.06); }
.meal-food-item .mfh { height:22px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:#fff; }
.meal-food-item .mfb { flex:1; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; padding:3px; text-align:center; color:#fff; }
#mealConfirmBtn {
  padding:10px 28px; font-size:15px; font-family:Georgia,serif;
  background:linear-gradient(135deg,#f0c040,#c09020);
  color:#1a1a1a; border:none; border-radius:8px; font-weight:bold; cursor:pointer;
}

/* ゲームオーバー */
#gameoverOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.88); z-index:300;
  flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#gameoverOverlay.show { display:flex; }
#gameoverOverlay h1 { color:#ff6060; font-size:32px; letter-spacing:3px; }
#gameoverOverlay p { color:#ccc; font-size:14px; text-align:center; }
#restartBtn {
  padding:12px 36px; font-size:16px; font-family:Georgia,serif;
  background:linear-gradient(135deg,#e8b84b,#c49a2a);
  color:#1a1a1a; border:none; border-radius:8px; font-weight:bold; cursor:pointer;
}



#toast {
  position:fixed; top:68px; left:50%; transform:translateX(-50%);
  background:rgba(20,20,40,.9); color:#fff; font-size:12px;
  padding:6px 16px; border-radius:16px; border:1px solid rgba(255,255,255,.15);
  pointer-events:none; z-index:50; opacity:0; transition:opacity .25s; white-space:nowrap;
}
#toast.show { opacity:1; }
</style>
</head>
<body>

<div id="ui">
  <div class="ui-zone" id="trashZone">売却</div>
  <div id="packShopsRow">
    <div class="pack-shop-zone" id="packShopA">
      <span class="ps-name">冒険パック</span><span class="ps-cost">💎×3</span>
    </div>
    <div class="pack-shop-zone" id="packShopB">
      <span class="ps-name">農業パック</span><span class="ps-cost">💎×3</span>
    </div>
  </div>
</div>

<div id="dayBarWrap"><div id="dayBar"></div></div>
<div id="dayLabel">0日目</div>

<canvas id="game"></canvas>

<div id="initPackCard">
  <div class="pi">📦</div><div>冒険の始まり</div><sub>タップで開封</sub>
</div>

<div id="packOverlay">
  <h2>パック開封！</h2>
  <div id="packCards"></div>
  <button id="packCloseBtn">盤面に追加</button>
</div>

<div id="mealOverlay">
  <h2>🍽 食事の時間</h2>
  <div id="mealInfo"></div>
  <div id="mealFoodList"></div>
  <button id="mealConfirmBtn">確定</button>
</div>

<div id="gameoverOverlay">
  <h1>GAME OVER</h1>
  <p id="gameoverMsg"></p>
  <button id="restartBtn">もう一度</button>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════
// 定数
// ════════════════════════════════════════════════
const canvas = document.getElementById("game");
const ctx    = canvas.getContext("2d");
const UI_H   = 60;   // UIバー52px + 日数バー8px
const CW=80, CH=100;
const WORLD_W=2400, WORLD_H=2400;
const DAY_MS = 2 * 60 * 1000;

function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize();

// ── 属性スタイル ──────────────────────────────
const ATTR_STYLE = {
  human:    { hd:"#4a6a9a", bg:"#7aaad0", label:"人間",   light:false },
  resource: { hd:"#3a6a3a", bg:"#6aaa6a", label:"資源",   light:false },
  material: { hd:"#7a5020", bg:"#b88050", label:"素材",   light:false },
  building: { hd:"#6a5030", bg:"#a08060", label:"施設",   light:false },
  currency: { hd:"#2a6050", bg:"#4a9880", label:"通貨",   light:true  },
  tool:     { hd:"#5a3070", bg:"#9060a8", label:"道具",   light:true  },
  food:     { hd:"#8a3030", bg:"#c86060", label:"食べ物", light:false },
};
function attrSt(attr){ return ATTR_STYLE[attr]||{hd:"#888",bg:"#bbb",label:attr,light:false}; }

// ── カード定義 ────────────────────────────────
const DEFS = {
  human:      { label:"村人",       attr:"human",    sell:null, maxUses:null },
  baby:       { label:"赤ちゃん",   attr:"human",    sell:null, maxUses:null },
  tree:       { label:"木",         attr:"resource", sell:1,    maxUses:2    },
  rock:       { label:"岩",         attr:"resource", sell:1,    maxUses:2    },
  apple_tree: { label:"リンゴの木", attr:"resource", sell:1,    maxUses:2    },
  wood:       { label:"木材",       attr:"material", sell:1,    maxUses:null },
  stick:      { label:"木の棒",     attr:"material", sell:2,    maxUses:null },
  dirt:       { label:"土",         attr:"material", sell:0,    maxUses:null },
  soil:       { label:"耕地",       attr:"building", sell:1,    maxUses:null },
  stone:      { label:"石材",       attr:"material", sell:1,    maxUses:null },
  flint:      { label:"火打石",     attr:"material", sell:2,    maxUses:null },
  seed:       { label:"種",         attr:"material", sell:1,    maxUses:null },
  flour:      { label:"小麦",       attr:"material", sell:1,    maxUses:null },
  house:      { label:"家",         attr:"building", sell:4,    maxUses:null },
  hoe:        { label:"くわ",       attr:"tool",     sell:2,    maxUses:5    },
  emerald:    { label:"エメラルド", attr:"currency", sell:null, maxUses:null },
  apple:      { label:"リンゴ",     attr:"food",     sell:2,    maxUses:null, satiety:1 },
  bread:      { label:"パン",       attr:"food",     sell:3,    maxUses:null, satiety:5 },
};
function def(type){ return DEFS[type]||{label:type,attr:"material",sell:1,maxUses:null}; }

// ── レシピ ────────────────────────────────────
const RECIPES = [
  { inputs:{human:1,tree:1},         variants:[{out:"wood", w:100}],                   time:3000,  keepAttrs:["human"] },
  { inputs:{human:1,rock:1},         variants:[{out:"stone",w:80},{out:"flint",w:20}], time:2000,  keepAttrs:["human"] },
  { inputs:{human:1,wood:2,stone:2}, variants:[{out:"house",w:100}],                   time:6000,  keepAttrs:["human"] },
  { inputs:{human:1,wood:1},         variants:[{out:"stick",w:100}],                   time:3000,  keepAttrs:["human"] },
  { inputs:{human:2,house:1},        variants:[{out:"baby", w:100}],                   time:10000, keepAttrs:["human","building"] },
  { inputs:{baby:1,house:1},         variants:[{out:"human",w:100}],                   time:10000, keepAttrs:["building"] },
  { inputs:{wood:2,stick:1},         variants:[{out:"hoe",  w:100}],                   time:4000,  keepAttrs:[] },
  { inputs:{human:1,apple_tree:1},   variants:[{out:"apple",w:100}],                   time:4000,  keepAttrs:["human"] },
  { inputs:{dirt:1,hoe:1,human:1},   variants:[{out:"soil", w:100}],                   time:5000,  keepAttrs:["human"] },
  { inputs:{dirt:1,apple:1},         variants:[{out:"apple_tree",w:100}],              time:10000, keepAttrs:[] },
  { inputs:{soil:1,seed:1},          variants:[{out:"flour",w:100}],                   time:8000,  keepAttrs:["building"] },
  { inputs:{flour:2},                variants:[{out:"bread",w:100}],                   time:7000,  keepAttrs:[] },
];
function pickOut(r){ const tot=r.variants.reduce((s,v)=>s+v.w,0); let x=Math.random()*tot; for(const v of r.variants){x-=v.w;if(x<=0)return v.out;} return r.variants[0].out; }

// ── パックプール ──────────────────────────────
const PACK_A=[{type:"tree",w:35},{type:"rock",w:35},{type:"apple_tree",w:25},{type:"human",w:5}];
const PACK_B=[{type:"dirt",w:40},{type:"apple_tree",w:30},{type:"seed",w:30}];
function drawPool(pool,n){
  const tot=pool.reduce((s,p)=>s+p.w,0);
  return Array.from({length:n},()=>{ let r=Math.random()*tot; for(const p of pool){r-=p.w;if(r<=0)return p.type;} return pool[0].type; });
}

// ════════════════════════════════════════════════
// 状態
// ════════════════════════════════════════════════
let cards=[], nextId=1;

// progressMap: groupKey → {progress, recipe}
// キーはクラフト開始時点のIDセット。ドラッグ通過で変わらないよう
// グループ構築時にドラッグ中カードを「透明（除外）」にして判定する。
let progressMap={};

let dragging=null, dragOffX=0, dragOffY=0;
let isDragGroup=false, groupCards=[], groupOffsets=[];
let lastTime=0;
let initPackOpened=false, pendingPackTypes=[];
let gameOver=false;

// 日時（パック開封後にスタート）
let dayStarted=false;
let dayTimer=0, dayCount=1;
let mealPhase=false;
let mealSelectedIds=new Set();

// カメラ
let camX=0, camY=0, camScale=1;
const MIN_SC=0.3, MAX_SC=3;
let pinchActive=false, pinchStartDist=0, pinchStartScale=1;
let pinchMidW={x:0,y:0}, pinchMidS={x:0,y:0};
let panActive=false, panStartX=0, panStartY=0, panCamX=0, panCamY=0;

function mkCard(type,x,y,extra={}){
  const d=def(type);
  return cards[cards.push({id:nextId++,type,x,y,w:CW,h:CH,stack:1,uses:0,maxUses:d.maxUses,...extra})-1];
}
function worldClamp(x,y){ return {x:Math.max(0,Math.min(WORLD_W-CW,x)), y:Math.max(0,Math.min(WORLD_H-CH,y))}; }

// 初期カード（ワールド中央に配置）
const INIT_WX = WORLD_W/2, INIT_WY = WORLD_H/2;
mkCard("human", INIT_WX, INIT_WY);

// ── カメラ変換 ──────────────────────────────
function s2w(sx,sy){ return {x:(sx-camX)/camScale, y:(sy-camY)/camScale}; }

// 初期カメラ：ワールド中央をスクリーン中央に合わせる
function initCamera(){
  const gameH = canvas.height - UI_H;
  camX = canvas.width/2  - INIT_WX * camScale;
  camY = gameH/2         - INIT_WY * camScale;
}
initCamera();
window.addEventListener("resize", ()=>{ resize(); initCamera(); });

// カメラをワールド境界内にクランプ
// ワールドの端がスクリーン外に出すぎないように制限する
function clampCam(){
  // ワールド左端 (x=0) がスクリーン右端より右に行かせない
  // ワールド右端 (x=WORLD_W) がスクリーン左端より左に行かせない
  const gameH = canvas.height - UI_H;
  const maxCamX =  100 * camScale;                          // 左端を少し引っ張れる余裕
  const minCamX = canvas.width  - WORLD_W * camScale - 100 * camScale;
  const maxCamY =  100 * camScale;
  const minCamY = gameH - WORLD_H * camScale - 100 * camScale;
  camX = Math.max(minCamX, Math.min(maxCamX, camX));
  camY = Math.max(minCamY, Math.min(maxCamY, camY));
}

// ════════════════════════════════════════════════
// 初期パック
// ════════════════════════════════════════════════
document.getElementById("initPackCard").addEventListener("click",()=>{
  if(initPackOpened)return;
  initPackOpened=true;
  document.getElementById("initPackCard").style.display="none";
  openPackOverlay(["tree","rock","apple_tree"]);
});

function openPackOverlay(types){
  pendingPackTypes=types;
  const cont=document.getElementById("packCards");
  cont.innerHTML="";
  types.forEach((type,i)=>{
    const d=def(type),as=attrSt(d.attr);
    const el=document.createElement("div");
    el.className="pack-card-preview";
    el.innerHTML=`<div class="pch" style="background:${as.hd};color:${as.light?"#ddd":"#fff"}">${d.label}</div>
                  <div class="pcb" style="background:${as.bg};color:${as.light?"#ddd":"#333"}">${d.label}</div>`;
    cont.appendChild(el);
    setTimeout(()=>el.classList.add("pop"),80+i*120);
  });
  document.getElementById("packOverlay").classList.add("show");
}

document.getElementById("packCloseBtn").addEventListener("click",()=>{
  document.getElementById("packOverlay").classList.remove("show");
  const wc=s2w(canvas.width/2,canvas.height/2);
  const sp=110, sx=wc.x-((pendingPackTypes.length-1)*sp)/2;
  pendingPackTypes.forEach((type,i)=>{
    const p=findFreePos(sx+i*sp,wc.y-40);
    mkCard(type,p.x,p.y);
  });
  pendingPackTypes=[];
  // 初期パックの盤面追加後に日数スタート
  if(!dayStarted){
    dayStarted=true;
    document.getElementById("dayLabel").textContent="1日目";
  }
});

// ════════════════════════════════════════════════
// 食事ターン
// ════════════════════════════════════════════════
function startMealPhase(){
  mealPhase=true;
  mealSelectedIds.clear();
  const humans=cards.filter(c=>c.type==="human"||c.type==="baby");
  const needed=humans.length;
  const foodCards=cards.filter(c=>def(c.type).attr==="food");

  document.getElementById("mealInfo").innerHTML=
    `村人: <b>${needed}</b>人　必要な満腹度: <b>${needed*2}</b><br>食べさせる食料をタップして選択してください。`;

  const list=document.getElementById("mealFoodList");
  list.innerHTML="";
  if(foodCards.length===0){
    list.innerHTML=`<div style="color:#faa;font-size:13px;">食べ物がありません！</div>`;
  } else {
    foodCards.forEach(c=>{
      const d=def(c.type),as=attrSt(d.attr);
      // 実際の満腹度を計算（partialSatietyを考慮）
      const actualSat = c.partialSatiety!==undefined
        ? (c.stack-1)*(d.satiety||0)+c.partialSatiety
        : (d.satiety||0)*c.stack;
      const el=document.createElement("div");
      el.className="meal-food-item";
      el.dataset.cardId=c.id;
      el.innerHTML=`<div class="mfh" style="background:${as.hd}">${d.label}</div>
                    <div class="mfb" style="background:${as.bg}">満腹度 ${actualSat}</div>`;
      el.addEventListener("click",()=>toggleMealFood(c,el,needed));
      list.appendChild(el);
    });
  }
  updateMealBtn(needed);
  document.getElementById("mealOverlay").classList.add("show");
}

function toggleMealFood(card,el,needed){
  if(mealSelectedIds.has(card.id)){
    mealSelectedIds.delete(card.id);
    el.classList.remove("selected");
  } else {
    mealSelectedIds.add(card.id);
    el.classList.add("selected");
  }
  updateMealBtn(needed);
}

function selectedSatiety(){
  let s=0;
  for(const id of mealSelectedIds){
    const c=cards.find(x=>x.id===id);
    if(!c) continue;
    const d=def(c.type);
    // partialSatietyがある場合：(stack-1)*satiety + partialSatiety
    if(c.partialSatiety!==undefined){
      s+=(c.stack-1)*(d.satiety||0)+c.partialSatiety;
    } else {
      s+=(d.satiety||0)*c.stack;
    }
  }
  return s;
}

function updateMealBtn(needed){
  const btn=document.getElementById("mealConfirmBtn");
  const foodCards=cards.filter(c=>def(c.type).attr==="food");
  const sat=selectedSatiety();
  const sufficient=sat>=needed*2;
  const noFood=foodCards.length===0;
  // 常に確定可能（食料不足の場合はその分の村人が死ぬ）
  btn.disabled=false;
  const dead=Math.max(0,needed-Math.floor(sat/2));
  btn.textContent=noFood ? `確定（食料なし・${needed}人死亡）`
    : sufficient ? `確定 (満腹度 ${sat}/${needed*2})`
    : `確定 (満腹度 ${sat}/${needed*2}・${dead}人死亡)`;
}

document.getElementById("mealConfirmBtn").addEventListener("click",()=>{
  const humans=cards.filter(c=>c.type==="human"||c.type==="baby");
  const needed=humans.length;
  const sat=selectedSatiety();
  const fed=Math.floor(sat/2);
  const dead=Math.max(0,needed-fed);

  // 選択した食べ物カードを満腹度単位で消費し、余剰はカードに残す
  let satNeeded = needed * 2; // 必要総満腹度
  for(const id of mealSelectedIds){
    if(satNeeded<=0) break;
    const c=cards.find(x=>x.id===id);
    if(!c) continue;
    const d=def(c.type);
    // partialSatiety を考慮した実際の総満腹度
    const cardSat = c.partialSatiety!==undefined
      ? (c.stack-1)*(d.satiety||0)+c.partialSatiety
      : (d.satiety||0)*c.stack;
    if(cardSat<=satNeeded){
      // 全部消費
      satNeeded-=cardSat;
      cards=cards.filter(x=>x.id!==id);
    } else {
      // 一部消費 → 余剰満腹度をカードに残す
      const surplus=cardSat-satNeeded;
      satNeeded=0;
      const newStack=Math.floor(surplus/(d.satiety||1));
      const remSat=surplus%(d.satiety||1);
      if(newStack>0){
        c.stack=newStack;
        if(remSat>0) c.partialSatiety=remSat; else delete c.partialSatiety;
      } else if(remSat>0){
        c.stack=1;
        c.partialSatiety=remSat;
      } else {
        cards=cards.filter(x=>x.id!==id);
      }
    }
  }
  mealSelectedIds.clear();

  // 村人をdead人削除
  let killed=dead;
  for(let i=cards.length-1;i>=0&&killed>0;i--){
    if(cards[i].type==="human"||cards[i].type==="baby"){ cards.splice(i,1); killed--; }
  }

  document.getElementById("mealOverlay").classList.remove("show");
  mealPhase=false;

  const left=cards.filter(c=>c.type==="human"||c.type==="baby").length;
  if(dead>0) toast(`${dead}人の村人が飢えで死亡...`);
  else toast("全員が食事を終えました！");

  if(left===0) triggerGameOver();
});

function triggerGameOver(){
  gameOver=true;
  document.getElementById("gameoverMsg").textContent=`${dayCount}日目に村人が全滅しました`;
  document.getElementById("gameoverOverlay").classList.add("show");
}
document.getElementById("restartBtn").addEventListener("click",()=>location.reload());

// ════════════════════════════════════════════════
// ユーティリティ
// ════════════════════════════════════════════════
function overlap(a,b){
  return !(a.x+a.w<=b.x||b.x+b.w<=a.x||a.y+a.h<=b.y||b.y+b.h<=a.y);
}

// ── クラフト通過リセット修正の核心 ──────────────
// グループ構築時にドラッグ中カード（単体ドラッグ）を除外して判定する。
// これにより、ドラッグ中カードが通過してもグループキーが変わらない。
function connectedExcluding(start, excludeIds){
  const vis=new Set(), stack=[start], grp=[];
  while(stack.length){
    const cur=stack.pop();
    if(vis.has(cur.id))continue;
    vis.add(cur.id); grp.push(cur);
    for(const o of cards){
      if(!vis.has(o.id)&&!excludeIds.has(o.id)&&overlap(cur,o)) stack.push(o);
    }
  }
  return grp;
}

function connected(start){
  return connectedExcluding(start, new Set());
}

// クラフト進行管理用：ドラッグ中カードを除外してグループ構築
function allGroupsForCraft(){
  // 単体ドラッグ：そのカードを除外
  // グループドラッグ：グループ全カードを除外（通過してもクラフトリセットしない）
  let excludeIds;
  if(dragging && !isDragGroup){
    excludeIds = new Set([dragging.id]);
  } else if(dragging && isDragGroup){
    excludeIds = new Set(groupCards.map(c=>c.id));
  } else {
    excludeIds = new Set();
  }

  const vis=new Set(), groups=[];
  for(const c of cards){
    if(vis.has(c.id)) continue;
    if(excludeIds.has(c.id)) continue;
    const g=connectedExcluding(c, excludeIds);
    g.forEach(x=>vis.add(x.id));
    groups.push(g);
  }
  return groups;
}

function allGroups(){
  const vis=new Set(), groups=[];
  for(const c of cards){
    if(vis.has(c.id))continue;
    const g=connected(c);
    g.forEach(x=>vis.add(x.id));
    groups.push(g);
  }
  return groups;
}

function gKey(grp){ return grp.map(c=>c.id).sort((a,b)=>a-b).join(","); }

function matchRecipe(grp){
  const cnt={};
  for(const c of grp) cnt[c.type]=(cnt[c.type]||0)+1;
  for(const r of RECIPES){
    let ok=true;
    for(const k in r.inputs) if(cnt[k]!==r.inputs[k]){ok=false;break;}
    if(!ok) continue;
    for(const k in cnt) if(r.inputs[k]===undefined){ok=false;break;}
    if(ok) return r;
  }
  return null;
}

// 現在のカメラ可視範囲内にワールド座標をクランプ
function viewClamp(wx, wy){
  // カメラ可視範囲をワールド座標で計算
  const gameH = canvas.height - UI_H;
  const left   = Math.max(0, -camX / camScale);
  const top    = Math.max(0, -camY / camScale);
  const right  = Math.min(WORLD_W, (canvas.width  - camX) / camScale);
  const bottom = Math.min(WORLD_H, (gameH         - camY) / camScale);
  return {
    x: Math.max(left, Math.min(right  - CW, wx)),
    y: Math.max(top,  Math.min(bottom - CH, wy)),
  };
}

// ワールド境界内クランプ（カード手動移動用・既存位置修正用）
function worldClamp(wx, wy){
  return {
    x: Math.max(0, Math.min(WORLD_W - CW, wx)),
    y: Math.max(0, Math.min(WORLD_H - CH, wy)),
  };
}

function findFreePos(bx,by){
  const angles=[0,Math.PI/2,Math.PI,3*Math.PI/2,Math.PI/4,3*Math.PI/4,5*Math.PI/4,7*Math.PI/4];
  for(const d of [120,160,200,260]){
    for(const a of angles){
      const p=viewClamp(bx+Math.cos(a)*d, by+Math.sin(a)*d);
      const cand={x:p.x,y:p.y,w:CW,h:CH};
      if(cards.every(c=>!overlap(c,cand))) return p;
    }
  }
  return viewClamp(bx+140,by);
}

function addEmeralds(n,sx,sy){
  const p=viewClamp(sx||100,sy||100);
  const em=cards.find(c=>c.type==="emerald");
  if(em){ em.stack+=n; } else { const c=mkCard("emerald",p.x,p.y); c.stack=n; }
}

let toastTmr=null;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove("show"),2500);
}

// ════════════════════════════════════════════════
// タッチ
// ════════════════════════════════════════════════
function touchW(t){ return s2w(t.clientX, t.clientY-UI_H); }

function hitCard(wx,wy){
  for(let i=cards.length-1;i>=0;i--){
    const c=cards[i];
    if(wx>=c.x&&wx<=c.x+c.w&&wy>=c.y&&wy<=c.y+c.h) return {card:c,idx:i};
  }
  return null;
}

// グループ内で最もYが小さいカード（一番「上」＝スタックの底）
function bottomCard(grp){ return grp.reduce((a,b)=>a.y<b.y?a:b); }

canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(mealPhase||gameOver) return;

  if(e.touches.length===2){
    dragging=null; isDragGroup=false;
    pinchActive=true; panActive=false;
    pinchStartDist=tdist(e.touches[0],e.touches[1]);
    pinchStartScale=camScale;
    const mid=tmid(e.touches[0],e.touches[1]);
    pinchMidS={x:mid.x, y:mid.y-UI_H};
    pinchMidW=s2w(pinchMidS.x,pinchMidS.y);
    return;
  }
  if(e.touches.length===1&&!pinchActive){
    const t=e.touches[0];
    const wpos=touchW(t);
    const hit=hitCard(wpos.x,wpos.y);
    if(hit){
      const {card,idx}=hit;
      const grp=connected(card);
      // タップしたカードのYより大きい（上に積まれた）カードを収集
      const tapY=card.y;
      const moveCards=grp.filter(c=>c.y>=tapY);

      // グループが複数かつ、タップカードが最下位（Y最小）の場合もグループ全体移動
      const isBottomCard = grp.length>1 && grp.every(c=>c.y>=tapY);

      if(grp.length>1 && (moveCards.length>1 || isBottomCard)){
        // ── グループ移動 ──
        // isBottomCard の場合はグループ全体を移動
        const actualMove = isBottomCard ? [...grp] : moveCards;
        const notMoved=cards.filter(c=>!actualMove.includes(c));
        const sortedMove=[...actualMove].sort((a,b)=>a.y-b.y);
        cards.splice(0,cards.length,...notMoved,...sortedMove);

        isDragGroup=true;
        dragging=card;
        groupCards=[...sortedMove];
        groupOffsets=sortedMove.map(c=>({dx:wpos.x-c.x,dy:wpos.y-c.y}));
      } else {
        // ── 単体移動（孤立カード、またはグループ最上位カードの単独引き抜き） ──
        const grpBefore=connected(card);
        const restGrp=grpBefore.filter(c=>c.id!==card.id);

        isDragGroup=false; dragging=card;
        dragOffX=wpos.x-card.x; dragOffY=wpos.y-card.y;
        cards.splice(idx,1); cards.push(card);
        cancelCraftForCard(card);

        // 残りグループでレシピが成立すればクラフト開始
        if(restGrp.length>0){
          const restRecipe=matchRecipe(restGrp);
          if(restRecipe){
            const rk=gKey(restGrp);
            if(!progressMap[rk]) progressMap[rk]={progress:0,recipe:restRecipe};
          }
        }
      }
    } else {
      panActive=true;
      panStartX=t.clientX; panStartY=t.clientY;
      panCamX=camX; panCamY=camY;
    }
  }
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(mealPhase||gameOver) return;

  if(e.touches.length===2&&pinchActive){
    const dist=tdist(e.touches[0],e.touches[1]);
    const newSc=Math.max(MIN_SC,Math.min(MAX_SC,pinchStartScale*(dist/pinchStartDist)));
    camScale=newSc;
    camX=pinchMidS.x-pinchMidW.x*camScale;
    camY=pinchMidS.y-pinchMidW.y*camScale;
    clampCam();
    return;
  }
  if(!dragging&&panActive&&e.touches.length===1){
    const t=e.touches[0];
    camX=panCamX+(t.clientX-panStartX);
    camY=panCamY+(t.clientY-panStartY);
    clampCam();
    return;
  }
  if(!dragging) return;

  const t=e.touches[0];
  const rawY=t.clientY;
  const wpos=touchW(t);

  if(isDragGroup){
    groupCards.forEach((c,i)=>{
      const np=viewClamp(wpos.x-groupOffsets[i].dx, wpos.y-groupOffsets[i].dy);
      c.x=np.x; c.y=np.y;
    });
  } else {
    const np=viewClamp(wpos.x-dragOffX, wpos.y-dragOffY);
    dragging.x=np.x; dragging.y=np.y;
  }

  const d=def(dragging.type);
  document.getElementById("trashZone").classList.toggle("active",rawY<UI_H&&!!d.sell);
  document.getElementById("packShopA").classList.toggle("active",rawY<UI_H&&dragging.type==="emerald");
  document.getElementById("packShopB").classList.toggle("active",rawY<UI_H&&dragging.type==="emerald");
},{passive:false});

canvas.addEventListener("touchend",e=>{
  e.preventDefault();
  if(e.touches.length<2) pinchActive=false;
  if(e.touches.length===0) panActive=false;
  if(mealPhase||gameOver||!dragging) return;

  const t=e.changedTouches[0];
  document.getElementById("trashZone").classList.remove("active");
  document.getElementById("packShopA").classList.remove("active");
  document.getElementById("packShopB").classList.remove("active");

  if(t.clientY<UI_H){
    handleUIZoneDrop(t);
  } else {
    // 単体・グループ問わず常にスタック補正を試みる
    snapStack(dragging);
    tryStartCraft(dragging);
  }
  dragging=null; isDragGroup=false; groupCards=[]; groupOffsets=[];
},{passive:false});

function tdist(a,b){ const dx=a.clientX-b.clientX,dy=a.clientY-b.clientY; return Math.sqrt(dx*dx+dy*dy); }
function tmid(a,b){ return {x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2}; }

function cancelCraftForCard(card){
  for(const key of Object.keys(progressMap)){
    if(key.split(",").map(Number).includes(card.id)) delete progressMap[key];
  }
}

function handleUIZoneDrop(t){
  const d=def(dragging.type);
  const sellCards=isDragGroup?groupCards:[dragging];

  if(dragging.type==="emerald"){
    const rB=document.getElementById("packShopB").getBoundingClientRect();
    const pool=(t.clientX>=rB.left&&t.clientX<=rB.right)?PACK_B:PACK_A;
    if(dragging.stack>=3){
      dragging.stack-=3;
      if(dragging.stack<=0) cards=cards.filter(c=>c!==dragging);
      openPackOverlay(drawPool(pool,3));
      toast("パックを購入しました！");
    } else { toast("💎が3個必要です"); }
    return;
  }

  let total=0, sx=dragging.x, sy=dragging.y;
  for(const sc of sellCards){
    const sd=def(sc.type);
    if(sd.sell!==null&&sd.sell>=0&&sc.type!=="human"){
      total+=(sd.sell)*sc.stack;
      cards=cards.filter(c=>c!==sc);
    }
  }
  if(isDragGroup) dragging=null;
  if(total>0){ addEmeralds(total,sx,sy); toast(`売却: 💎×${total}`); }
}

// ── スタック位置補正 ──────────────────────────
function snapStack(dropped){
  // ドロップ後の現在位置で connected を取得
  // ただしグループドラッグ中は groupCards 全体が動いているので
  // dropped と重なっている「groupCards以外」のカードを探す
  const movingIds = isDragGroup ? new Set(groupCards.map(c=>c.id)) : new Set([dropped.id]);

  // dropped が重なっている外部カード（移動していないカード）を探す
  const externalOverlap = cards.filter(c=>!movingIds.has(c.id) && overlap(dropped, c));
  if(externalOverlap.length===0) return; // 何とも重なっていない → 補正不要

  // 外部カードから連結グループを構築（移動カードを除外）
  const vis=new Set(movingIds);
  const stackBase=[];
  const queue=[externalOverlap[0]];
  while(queue.length){
    const cur=queue.pop();
    if(vis.has(cur.id)) continue;
    vis.add(cur.id); stackBase.push(cur);
    for(const o of cards) if(!vis.has(o.id)&&overlap(cur,o)) queue.push(o);
  }
  if(stackBase.length===0) return;

  // 既存スタックのX基準（Y最小のカード）とY最大
  stackBase.sort((a,b)=>a.y-b.y);
  const baseX = stackBase[0].x;
  const maxY  = Math.max(...stackBase.map(c=>c.y));

  if(isDragGroup){
    // グループ全体を既存スタックのX・Y最下段の24px下から積み上げ
    const sorted=[...groupCards].sort((a,b)=>a.y-b.y);
    sorted.forEach((c,i)=>{
      const p=viewClamp(baseX, maxY+24+i*24);
      c.x=p.x; c.y=p.y;
    });
  } else {
    // 単体：既存スタック最下段の24px下
    const p=viewClamp(baseX, maxY+24);
    dropped.x=p.x; dropped.y=p.y;
  }
}

// ── クラフト開始（ドロップ時のみ） ───────────
function tryStartCraft(dropped){
  const grp=connected(dropped);
  const recipe=matchRecipe(grp);
  if(!recipe) return;
  const key=gKey(grp);
  if(progressMap[key]) return;
  progressMap[key]={progress:0,recipe};
}

// ════════════════════════════════════════════════
// 更新
// ════════════════════════════════════════════════
function update(dt){
  if(mealPhase||gameOver) return;

  // 日時タイマー（初期パック開封後のみ）
  if(dayStarted){
    dayTimer+=dt;
    const ratio=Math.min(dayTimer/DAY_MS,1);
    document.getElementById("dayBar").style.width=(ratio*100)+"%";
    document.getElementById("dayLabel").textContent=`${dayCount}日目`;
    if(dayTimer>=DAY_MS){
      dayTimer=0; dayCount++;
      startMealPhase();
      return;
    }
  }

  // ── クラフト更新 ──────────────────────────
  const newPM={};
  const byKey={};
  for(const g of allGroupsForCraft()) byKey[gKey(g)]=g;

  // グループドラッグ中のカードIDセット
  const dragGroupIdSet = (isDragGroup && groupCards.length>0)
    ? new Set(groupCards.map(c=>c.id))
    : new Set();

  for(const [key,info] of Object.entries(progressMap)){
    // グループドラッグ中：そのグループがクラフト中グループに完全に含まれる場合は進捗を維持
    const craftIds = new Set(key.split(",").map(Number));
    if(isDragGroup && dragGroupIdSet.size>0){
      const allInDrag = [...craftIds].every(id=>dragGroupIdSet.has(id));
      if(allInDrag){
        // ドラッグ中のグループ自体がクラフト中 → リセットせず進捗維持
        newPM[key]=info;
        continue;
      }
    }

    const grp=byKey[key];
    if(!grp||gKey(grp)!==key) continue;

    const recipe=matchRecipe(grp);
    if(!recipe) continue;
    if(RECIPES.indexOf(recipe)!==RECIPES.indexOf(info.recipe)) continue;

    const np=info.progress+dt;
    if(np>=recipe.time){
      // ── 完成 ──
      const keepAttrs=recipe.keepAttrs||[];
      const toRemove=[], toKeep=[], autoRestart=[];

      // グループをY順（小→大）でソートして基準位置を決める
      const sortedGrp=[...grp].sort((a,b)=>a.y-b.y);
      const baseCard=sortedGrp[0]; // Y最小（一番上）が基準
      const baseX=baseCard.x, baseY=baseCard.y;

      for(const c of grp){
        const d=def(c.type);
        if(keepAttrs.includes(d.attr)){
          toKeep.push(c);
        } else if(d.attr==="resource"){
          c.uses=(c.uses||0)+1;
          if(c.maxUses&&c.uses>=c.maxUses){ toRemove.push(c); }
          else { toKeep.push(c); autoRestart.push(c); }
        } else if(d.attr==="tool"){
          c.uses=(c.uses||0)+1;
          if(c.maxUses&&c.uses>=c.maxUses){ toRemove.push(c); }
          else { toKeep.push(c); }
        } else {
          toRemove.push(c);
        }
      }

      cards=cards.filter(c=>!toRemove.includes(c));

      // keepカードをスタック形式で整列（横揃え・縦24pxずつ）
      toKeep.forEach((c,i)=>{
        const p=worldClamp(baseX, baseY+i*24);
        c.x=p.x; c.y=p.y;
      });

      // 出力カード生成
      const outType=pickOut(recipe);
      const pos=findFreePos(baseX,baseY);
      const newCard=mkCard(outType,pos.x,pos.y);

      // 近くに同種カードがあれば自動グループ化（同種のみのグループに限定）
      const SNAP_DIST=250;
      const sameType=cards.filter(c=>c.id!==newCard.id&&c.type===outType);
      if(sameType.length>0){
        // 最も近い同種カードを探す（全方向・そのグループが同種のみかチェック）
        let nearest=null, nearestDist=Infinity;
        for(const sc of sameType){
          const cx=(sc.x+CW/2)-(newCard.x+CW/2);
          const cy=(sc.y+CH/2)-(newCard.y+CH/2);
          const dist=Math.sqrt(cx*cx+cy*cy);
          if(dist<nearestDist){
            const grpCheck=connected(sc);
            const allSame=grpCheck.every(gc=>gc.type===outType);
            if(allSame){ nearestDist=dist; nearest=sc; }
          }
        }
        if(nearest && nearestDist<SNAP_DIST){
          // nearestのスタック末尾に積む
          const grpN=connected(nearest);
          grpN.sort((a,b)=>a.y-b.y);
          const maxYN=Math.max(...grpN.map(c=>c.y));
          const sp=worldClamp(grpN[0].x, maxYN+24);
          newCard.x=sp.x; newCard.y=sp.y;
          // グループ化後にレシピが成立すればクラフト開始
          setTimeout(()=>{
            const snapGrp=connected(newCard);
            const snapRecipe=matchRecipe(snapGrp);
            if(snapRecipe){
              const sk=gKey(snapGrp);
              if(!progressMap[sk]) progressMap[sk]={progress:0,recipe:snapRecipe};
            }
          }, 50);
        }
      }

      // 資源が残っている場合 → 自動再開
      if(autoRestart.length>0){
        setTimeout(()=>{
          // 現在も盤面に残っているkeepカードを確認
          const survivors=toKeep.filter(c=>cards.includes(c));
          if(survivors.length===0) return;
          // スタック形式で再整列（横揃え・縦24pxずつ）
          const sortedS=[...survivors].sort((a,b)=>a.y-b.y);
          const refX=sortedS[0].x, refY=sortedS[0].y;
          sortedS.forEach((c,i)=>{
            const p=worldClamp(refX, refY+i*24);
            c.x=p.x; c.y=p.y;
          });
          // 再グループ化してクラフト開始
          const newGrp=connected(survivors[0]);
          const newRecipe=matchRecipe(newGrp);
          if(newRecipe){
            const nk=gKey(newGrp);
            if(!progressMap[nk]) progressMap[nk]={progress:0,recipe:newRecipe};
          }
        },80);
      }
    } else {
      newPM[key]={progress:np,recipe};
    }
  }
  progressMap=newPM;
}

// ════════════════════════════════════════════════
// 描画
// ════════════════════════════════════════════════
function drawCard(c,craftProg,craftTotal){
  const d=def(c.type), as=attrSt(d.attr);
  const {x,y}=c;
  const isDrag=(c===dragging)||(isDragGroup&&groupCards.includes(c));
  const r=8;

  ctx.save();
  if(isDrag){ ctx.shadowColor="rgba(0,0,0,.45)"; ctx.shadowBlur=14; ctx.shadowOffsetY=5; }

  ctx.beginPath(); ctx.roundRect(x,y,CW,CH,r);
  ctx.fillStyle=as.bg; ctx.fill();

  ctx.beginPath(); ctx.roundRect(x,y,CW,24,[r,r,0,0]);
  ctx.fillStyle=as.hd; ctx.fill();

  ctx.fillStyle=as.light?"#eee":"#fff";
  ctx.font="bold 11px Georgia"; ctx.textAlign="center";
  ctx.fillText(d.label,x+CW/2,y+16);

  // 属性バッジ
  ctx.fillStyle="rgba(0,0,0,.2)";
  ctx.beginPath(); ctx.roundRect(x+3,y+27,30,13,3); ctx.fill();
  ctx.fillStyle=as.light?"#ddd":"#fff";
  ctx.font="8px Georgia"; ctx.textAlign="center";
  ctx.fillText(as.label,x+18,y+37);

  // 売却値
  if(d.sell!==null&&d.sell>=0){
    ctx.fillStyle="rgba(0,0,0,.18)";
    ctx.beginPath(); ctx.roundRect(x+CW-34,y+27,31,13,3); ctx.fill();
    ctx.fillStyle=as.light?"#dde":"#fff";
    ctx.font="9px Georgia"; ctx.textAlign="center";
    ctx.fillText("💎"+d.sell,x+CW-18,y+37);
  }

  // 食べ物：満腹度
  if(d.attr==="food"&&d.satiety){
    ctx.fillStyle="rgba(255,255,255,.2)";
    ctx.beginPath(); ctx.roundRect(x+3,y+43,CW-6,14,3); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 10px Georgia"; ctx.textAlign="center";
    const dispSat = c.partialSatiety!==undefined
      ? (c.stack>1 ? `満腹度 ${(c.stack-1)*d.satiety}+${c.partialSatiety}` : `満腹度 ${c.partialSatiety}`)
      : `満腹度 ${d.satiety}`;
    ctx.fillText(dispSat,x+CW/2,y+53);
  }

  // 道具耐久バー
  if(d.attr==="tool"&&d.maxUses){
    const used=c.uses||0;
    const ratio=Math.max(0,(d.maxUses-used)/d.maxUses);
    const bx=x+4,by=y+44,bw=CW-8,bh=7;
    ctx.fillStyle="rgba(0,0,0,.25)";
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,3); ctx.fill();
    const rv=Math.floor(255*(1-ratio)),gv=Math.floor(200*ratio);
    ctx.fillStyle=`rgb(${rv},${gv},60)`;
    ctx.beginPath(); ctx.roundRect(bx,by,bw*ratio,bh,3); ctx.fill();
  }

  // スタック数
  if(c.stack>1){
    ctx.fillStyle="rgba(0,0,0,.6)";
    ctx.beginPath(); ctx.roundRect(x+CW-28,y+CH-22,25,18,4); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 11px Georgia"; ctx.textAlign="center";
    ctx.fillText("×"+c.stack,x+CW-15,y+CH-9);
  }

  // クラフト進行バー（秒数なし）
  if(craftTotal>0){
    const ratio=Math.min(craftProg/craftTotal,1);
    const bx=x+4,by=y+CH-12,bw=CW-8,bh=7;
    ctx.fillStyle="rgba(0,0,0,.3)";
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,4); ctx.fill();
    const g=ctx.createLinearGradient(bx,0,bx+bw,0);
    g.addColorStop(0,"#4ecdc4"); g.addColorStop(1,"#45b7d1");
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.roundRect(bx,by,bw*ratio,bh,4); ctx.fill();
  }

  if(isDrag){
    ctx.strokeStyle="#e8b84b"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(x,y,CW,CH,r); ctx.stroke();
  }
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#b8e0b2";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(camX,UI_H+camY);
  ctx.scale(camScale,camScale);

  // ドット格子
  const step=40;
  const tl=s2w(0,0), br=s2w(canvas.width,canvas.height);
  ctx.fillStyle="rgba(0,80,0,.06)";
  for(let gx=Math.floor(tl.x/step)*step;gx<=br.x;gx+=step)
    for(let gy=Math.floor(tl.y/step)*step;gy<=br.y;gy+=step){
      ctx.beginPath(); ctx.arc(gx,gy,1.2,0,Math.PI*2); ctx.fill();
    }

  // クラフト情報マップ
  const ci=new Map();
  for(const [key,info] of Object.entries(progressMap))
    for(const id of key.split(",").map(Number))
      ci.set(id,{progress:info.progress,total:info.recipe.time});

  for(const c of cards){
    const inf=ci.get(c.id);
    drawCard(c,inf?inf.progress:0,inf?inf.total:0);
  }
  ctx.restore();
}

// ════════════════════════════════════════════════
// ループ
// ════════════════════════════════════════════════
function loop(t){
  const dt=Math.min(t-lastTime,100);
  lastTime=t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lastTime=t;requestAnimationFrame(loop);});
</script>
</body>
</html>
