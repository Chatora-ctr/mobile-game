<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Craft Prototype</title>
<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; }
  canvas { background:#cfe8cf; display:block; }

  #ui {
    position:fixed;
    top:0; left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    background:#333;
    color:white;
    padding:5px;
    z-index:10;
  }

  button { font-size:16px; }
</style>
</head>
<body>

<div id="ui">
  <button id="packBtn">パック開封</button>
  <div>ゴミ箱（ここにドラッグで売却）</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let scale = 1;
let offsetX = 0;
let offsetY = 50;

let cards = [];
let groups = [];
let nextId = 1;

function createCard(type, x, y) {
  cards.push({
    id: nextId++,
    type,
    x, y,
    w:80, h:100,
    stack:1,
    group:null,
    crafting:false,
    progress:0
  });
}

// 初期状態
createCard("human", 100, 200);

// パック内容
document.getElementById("packBtn").onclick = () => {
  createCard("tree", 200, 200);
  createCard("rock", 300, 200);
  createCard("apple_tree", 400, 200);
};

// レシピ
const recipes = [
  { inputs:{human:1, tree:1}, output:"wood", time:2000 },
  { inputs:{human:1, rock:1}, output:"stone", time:2000 }
];

// タッチ操作
let dragging = null;

canvas.addEventListener("touchstart", e => {
  let t = e.touches[0];
  let x = (t.clientX - offsetX)/scale;
  let y = (t.clientY - offsetY)/scale;

  for (let i = cards.length-1; i>=0; i--) {
    let c = cards[i];
    if (x>c.x && x<c.x+c.w && y>c.y && y<c.y+c.h) {
      dragging = c;
      break;
    }
  }
});

canvas.addEventListener("touchmove", e => {
  if (!dragging) return;
  let t = e.touches[0];
  dragging.x = (t.clientX - offsetX)/scale - dragging.w/2;
  dragging.y = (t.clientY - offsetY)/scale - dragging.h/2;
});

canvas.addEventListener("touchend", e => {
  // ゴミ箱判定
  let t = e.changedTouches[0];
  if (t.clientY < 50) {
    if (dragging.type !== "human") {
      cards = cards.filter(c => c !== dragging);
    }
  }
  dragging = null;
});

// 重なり判定
function isOverlap(a,b){
  return !(a.x+a.w < b.x || b.x+b.w < a.x || a.y+a.h < b.y || b.y+b.h < a.y);
}

// グループ構築
function buildGroups(){
  groups = [];
  let visited = new Set();

  for (let c of cards) {
    if (visited.has(c)) continue;

    let stack = [c];
    let group = [];

    while(stack.length){
      let cur = stack.pop();
      if (visited.has(cur)) continue;
      visited.add(cur);
      group.push(cur);

      for (let other of cards){
        if (!visited.has(other) && isOverlap(cur, other)){
          stack.push(other);
        }
      }
    }

    groups.push(group);
  }
}

// レシピ判定
function matchRecipe(group){
  let count = {};
  for (let c of group){
    count[c.type] = (count[c.type]||0)+1;
  }

  for (let r of recipes){
    let ok = true;
    let keys = Object.keys(r.inputs);

    if (keys.length !== Object.keys(count).length) continue;

    for (let k of keys){
      if (count[k] !== r.inputs[k]) ok = false;
    }

    if (ok) return r;
  }
  return null;
}

// 更新
function update(dt){
  buildGroups();

  for (let g of groups){
    let r = matchRecipe(g);

    if (r){
      g.progress = (g.progress||0)+dt;

      if (g.progress >= r.time){
        // 完成
        let base = g[0];
        cards = cards.filter(c => !g.includes(c));

        createCard(r.output, base.x+20, base.y+20);
      }
    } else {
      g.progress = 0;
    }
  }
}

// 描画
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  for (let c of cards){
    ctx.fillStyle="#fff";
    ctx.fillRect(c.x, c.y, c.w, c.h);
    ctx.strokeRect(c.x, c.y, c.w, c.h);

    ctx.fillStyle="#000";
    ctx.fillText(c.type, c.x+5, c.y+20);
  }

  ctx.restore();
}

// ループ
let last = 0;
function loop(t){
  let dt = t - last;
  last = t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

loop(0);
</script>

</body>
</html>
